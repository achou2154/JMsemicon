async function saveEducation(empId) {
  const title = document.getElementById('edu-title')?.value?.trim();
  const s = getDateVal('edu-start');
  const e2 = getDateVal('edu-end') || s;
  const reason = document.getElementById('edu-reason')?.value?.trim() || '';
  if (!s) { showToast('시작일을 입력하세요'); return; }
  if (!title) { showToast('교육명을 입력하세요'); return; }
  const _r = {id:nextId++,type:'education',empId,status:'pending',year:currentYear,startDate:s,endDate:e2,reason:`[${title}] ${reason}`.trim(),reqDate:todayStr()};
  const _saved = await sbInsert('requests', {type:'education',emp_id:empId,status:'pending',year:currentYear,start_date:s,end_date:e2,reason:_r.reason,req_date:todayStr()});
  if (_saved) {
    _r.id = _saved.id;
    db.requests.unshift(_r);
    saveAll(); showToast('✅ 교육 신청 완료'); await notifyAdmin(_r);
  } else { showToast('⚠️ 저장 실패'); }
  closeModal(); renderTrip();
}

// ─ 8. 생일/기념일 ──────────────────────────
function renderBday(){
  const yr=currentYear;
  const todayD=parseLocalDate(todayStr());
  const rows=db.events.slice().sort((a,b)=>{const da=getEventDate(a,yr)||'9999';const db2=getEventDate(b,yr)||'9999';return da.localeCompare(db2);}).map(ev=>{
    const e=eid(ev.empId);
    const ds=getEventDate(ev,yr);
    const diff=ds?Math.round((parseLocalDate(ds)-todayD)/864e5):null;
    const upcoming=diff!==null&&diff>=0&&diff<=30;
    const isPast=diff!==null&&diff<0;
    // 지난 날짜 → 옅은 회색 배경
    const rowBg=isPast?'style="background:#f3f3f3;color:#999"':'';
    return`<tr ${rowBg}>
      <td>${e?`<div class="name-cell">${av(ev.empId)}<span${isPast?' style="color:#999"':''}>${e.name}</span></div>`:badge('전사','bday')}</td>
      <td${isPast?' style="color:#999"':''}>${ev.name}</td>
      <td>${ev.type==='birthday'?badge('생일','bday'):badge('기념일','neutral')}</td>
      <td>${ev.calType==='lunar'?badge('음력','warn'):badge('양력','neutral')}</td>
      <td${isPast?' style="color:#aaa"':''}>${ev.month}월 ${ev.day}일</td>
      <td${isPast?' style="color:#aaa"':''}>${ds?fmt(ds):'—'}${ev.calType==='lunar'?'<span style="font-size:10px;color:var(--text3)"> (음→양)</span>':''}</td>
      <td>${upcoming?`<span class="upcoming-chip">D-${diff}</span>`:diff===0?badge('오늘!','bday'):isPast?'<span style="font-size:11px;color:#bbb">경과</span>':''}</td>
      <td style="font-size:12px;color:${isPast?'#bbb':'var(--text2)'}">${ev.note||''}</td>
      ${isAdmin?`<td style="white-space:nowrap"><button class="btn btn-sm" onclick="openEditEvent(${ev.id})">수정</button> <button class="btn btn-sm btn-danger" onclick="delEvent(${ev.id})">삭제</button></td>`:'<td></td>'}
    </tr>`;
  }).join('');
  // db.events에서 기념일/생일 (올해 지났으면 내년으로)
  const evList30 = db.events.map(ev=>{
    let ds=getEventDate(ev,yr);
    if(!ds)return null;
    let diff=Math.round((parseLocalDate(ds)-todayD)/864e5);
    if(diff<0){ ds=getEventDate(ev,yr+1); if(!ds)return null; diff=Math.round((parseLocalDate(ds)-todayD)/864e5); }
    if(diff<0||diff>30)return null;
    return{...ev,ds,diff};
  }).filter(Boolean);
  // 직원 birthdate 직접 계산 (events 테이블에 없는 경우 보완)
  const evIds = new Set(evList30.map(ev=>String(ev.empId)));
  db.employees.filter(e=>e.birthdate&&!e.isExternal).forEach(e=>{
    if(evIds.has(String(e.id))) return; // 이미 events에 있으면 스킵
    const parts=e.birthdate.split('-');
    if(parts.length<3)return;
    const m=parseInt(parts[1]),d=parseInt(parts[2]);
    let ds=`${yr}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let diff=Math.round((parseLocalDate(ds)-todayD)/864e5);
    if(diff<0){ds=`${yr+1}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;diff=Math.round((parseLocalDate(ds)-todayD)/864e5);}
    if(diff<0||diff>30)return;
    evList30.push({id:'bd_'+e.id,empId:e.id,type:'birthday',name:e.name+' 생일',month:m,day:d,calType:e.birthdateLunar?'lunar':'solar',ds,diff});
  });
  const upcoming30=evList30.sort((a,b)=>a.diff-b.diff);
  setContent(`
    <div class="info-bar" style="background:var(--bday-bg);border:1px solid #7dd3fc;color:var(--bday)">🎂 음력 생일은 해당 연도 양력으로 자동 변환됩니다.</div>
    ${upcoming30.length?`<div class="card"><div class="card-title">30일 이내 예정</div><div style="display:flex;flex-wrap:wrap;gap:10px">${upcoming30.map(ev=>`<div style="padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-lg)"><div style="font-weight:500;font-size:13px;margin-bottom:3px">${ev.name}</div><div style="font-size:11px;color:var(--text2)">${fmt(ev.ds)}${ev.calType==='lunar'?' (음→양)':''}</div><div style="margin-top:5px"><span class="upcoming-chip">D-${ev.diff}</span></div></div>`).join('')}</div></div>`:''}
    <div class="card"><div class="card-title">${yr}년 생일/기념일 목록 ${isAdmin?`<button class="btn btn-primary btn-sm" onclick="openAddEvent()">+ 등록</button>`:''}</div>
      <div class="table-wrap"><table><thead><tr><th>직원</th><th>명칭</th><th>구분</th><th>달력</th><th>날짜</th><th>${yr}년 양력</th><th>D-day</th><th>비고</th><th></th></tr></thead><tbody>${rows||emptyRow(9)}</tbody></table></div>
    </div>
  `);
}

// ─ 9. 건강검진 ─────────────────────────────
function calcHealthCost(birthdate){
  // 생년월일로 만 40세 이상 여부 계산
  if(!birthdate) return 250000;
  const birth=parseLocalDate(birthdate);
  if(!birth) return 250000;
  const today=new Date();
  let age=today.getFullYear()-birth.getFullYear();
  const m=today.getMonth()-birth.getMonth();
  if(m<0||(m===0&&today.getDate()<birth.getDate())) age--;
  return age>=40?300000:250000;
}

function renderHealth(){
  const yr=currentYear;
  let empTotal=0,empDone=0,famTotal=0,famDone=0;

  // 타기관 검진자 목록 (별도 집계)
  const otherClinicEmps = [];
  db.employees.filter(e=>!e.isExternal).forEach(e=>{
    const h=db.health.find(r=>String(r.empId)===String(e.id)&&String(r.year)===String(yr));
    const isOther = h?.members?.some(m=>m.relation==='본인'&&m.otherClinic);
    if(isOther) { otherClinicEmps.push({e,h}); return; } // 타기관은 별도 집계, 메인 통계 제외
    empTotal++;
    if(h?.status==='completed') empDone++;
    (h?.members||[]).filter(m=>m.relation!=='본인').forEach(m=>{famTotal++;if(m.confirmed)famDone++;});
  });
  const totalAll = empTotal + famTotal;
  const doneAll = empDone + famDone;
  const pctAll = totalAll>0?Math.round(doneAll/totalAll*100):0;
  const pctEmp = empTotal>0?Math.round(empDone/empTotal*100):0;
  const otherClinicCount = otherClinicEmps.length;

  const statusBadge2 = (h) => {
    if (!h) return badge('미신청','neutral');
    if (h.status==='completed') return badge('✓ 수검완료','ok');
    if (h.status==='approved') return badge('승인됨','ok');
    if (h.status==='modify_requested') return badge('수정신청','warn');
    return badge('승인대기','warn');
  };

  // 2번: 수검일 오름차순 정렬
  const showEmps = isAdmin
    ? db.employees.filter(e=>!e.isExternal)
    : db.employees.filter(e=>currentEmp && String(e.id)===String(currentEmp.id));

  const sortedEmps = showEmps.slice().sort((a,b)=>{
    const ha = db.health.find(r=>String(r.empId)===String(a.id)&&String(r.year)===String(yr));
    const hb = db.health.find(r=>String(r.empId)===String(b.id)&&String(r.year)===String(yr));
    const da = ha?.reserveDate||'9999-99-99';
    const db2 = hb?.reserveDate||'9999-99-99';
    return da.localeCompare(db2); // 오름차순 (예약일 빠른 순)
  });

  const rows = sortedEmps.map(e=>{
    const h=db.health.find(r=>String(r.empId)===String(e.id)&&String(r.year)===String(yr));
    const isMine = currentEmp && String(e.id)===String(currentEmp.id);
    // 5번: 가족 관계 표시
    const famMembers = (h?.members||[]).filter(m=>m.relation!=='본인');
    const famBadges = famMembers.map(m=>`<span class="badge" style="font-size:10px;margin-right:2px">${m.relation}${isAdmin&&m.name?'('+m.name+')':''}</span>`).join('');
    return`<tr>
      <td><div class="name-cell">${av(e.id)}<span>${e.name}</span></div></td>
      <td>${e.dept}</td>
      <td style="font-size:12px">${h?.reserveDate?fmt(h.reserveDate):'—'}</td>
      <td style="font-size:12px">${h?.checkupDate?fmt(h.checkupDate):'—'}</td>
      <td>${statusBadge2(h)}</td>
      <td style="font-size:11px">${famBadges||'—'}</td>
      <td style="white-space:nowrap">
        ${(isMine||isAdmin)?`<button class="btn btn-sm btn-primary" onclick="openHealthApply(${e.id})">${h?'수정':'예약신청'}</button>`:''}
        ${isAdmin&&h&&(h.status==='pending'||h.status==='modify_requested')?`<button class="btn btn-sm btn-ok" style="margin-left:4px" onclick="approveHealth(${e.id})">승인</button>`:''}
        ${(isMine||isAdmin)&&h&&h.status==='approved'?`<button class="btn btn-sm" style="margin-left:4px" onclick="openHealthComplete(${e.id})">수검완료</button>`:''}
        ${(isMine||isAdmin)&&h?`<button class="btn btn-sm btn-danger" style="margin-left:4px" onclick="deleteHealth(${e.id})">삭제</button>`:''}
      </td>
    </tr>`;
  }).join('');

  // 타기관 검진자 행
  const otherRows = otherClinicEmps.map(({e,h})=>{
    const isMine = currentEmp && String(e.id)===String(currentEmp.id);
    const famMembers = (h?.members||[]).filter(m=>m.relation!=='본인');
    const famBadges = famMembers.map(m=>`<span class="badge" style="font-size:10px;margin-right:2px">${m.relation}</span>`).join('');

      <td><div class="name-cell">${av(e.id)}<span>${e.name}</span></div></td>
      <td>${e.dept}</td>
      <td colspan="2" style="font-size:12px;color:var(--text2)">타기관 검진 (실비지원)</td>
      <td><span class="badge" style="background:#fef3c7;color:#92400e">타기관</span></td>
      <td style="font-size:11px">${famBadges||'—'}</td>
      <td style="white-space:nowrap">
        ${(isMine||isAdmin)?`<button class="btn btn-sm btn-primary" onclick="openHealthApply(${e.id})">수정</button>`:''}

      <div class="stat-card" style="padding:10px 12px"><div class="stat-label" style="font-size:11px">가족 수검완료</div><div class="stat-val">${famDone}명</div><div class="stat-sub" style="font-size:10px">전체 ${famTotal}명</div></div>
      <div class="stat-card" style="padding:10px 12px;background:#fef9ec"><div class="stat-label" style="font-size:11px">타기관 검진</div><div class="stat-val" style="color:#92400e">${otherClinicCount}명</div><div class="stat-sub" style="font-size:10px">별도 집계</div></div>
      <div class="stat-card health" style="padding:10px 12px"><div class="stat-label" style="font-size:11px">전체 완료율</div><div class="stat-val">${pctAll}%</div><div class="stat-sub" style="font-size:10px">${doneAll}/${totalAll}명</div></div>
    </div>
    <div class="card">

      🏥 예약일 신청 → 관리자 승인 → 수검 완료 입력 순서로 진행됩니다

        <tbody>${(()=>{
          const dMap={};
          db.employees.filter(e=>!e.isExternal).forEach(e=>{
            if(!dMap[e.dept])dMap[e.dept]={total:0,applied:0,empCost:0,famCost:0};

            const h=db.health.find(r=>String(r.empId)===String(e.id)&&String(r.year)===String(yr));

async function saveHealthApply(empId) {
  const otherClinicFirst = document.getElementById('h-other-clinic')?.checked || false;
  let reserveDate = '';
  if (!otherClinicFirst) {
    const resY = document.getElementById('h-res-year')?.value;
    const resM = String(document.getElementById('h-res-month')?.value||'').padStart(2,'0');
    const resD = String(document.getElementById('h-res-day')?.value||'').padStart(2,'0');
    reserveDate = (resY&&resM&&resD) ? `${resY}-${resM}-${resD}` : '';
    if (!reserveDate || resY.length!==4) { showToast('예약일을 올바르게 입력하세요 (년 4자리)'); return; }
  }
  const yr = currentYear;
  const h = db.health.find(r=>String(r.empId)===String(empId)&&String(r.year)===String(yr));
  const newStatus = h?.status === 'approved' ? 'modify_requested' : 'pending';

  // 가족 정보 수집
  const famRows = document.querySelectorAll('#fam-list .fam-row');
  // otherClinic은 위에서 처리됨
  const members = [{relation:'본인', birthdate:'', confirmed:false, reserveDate, checkupDate:'', cost:0, otherClinic}];
  famRows.forEach(row => {
    const relEl = row.querySelector('input[id^="fam-rel"]');
    const nameEl = row.querySelector('input[id^="fam-name"]');
    const byEl = row.querySelector('input[id^="fam-by"]');
    const bmEl = row.querySelector('input[id^="fam-bm"]');
    const bdEl = row.querySelector('input[id^="fam-bd"]');
    const rel = relEl?.value?.trim();
    if (rel) {
      const by = byEl?.value||''; const bm = String(bmEl?.value||'').padStart(2,'0'); const bd = String(bdEl?.value||'').padStart(2,'0');
      const birthdate = (by&&bm&&bd) ? `${by}-${bm}-${bd}` : '';
      members.push({relation:rel, name:nameEl?.value?.trim()||'', birthdate, confirmed:false, reserveDate:'', checkupDate:'', cost:0});
    }
  });

  if (h?.id) {
    const ok = await sbUpdate('health_records', h.id, {
      reserve_date: reserveDate, status: newStatus, approved: false, members_json: JSON.stringify(members)
    });
    if (ok) { h.reserveDate = reserveDate; h.status = newStatus; h.approved = false; h.members = members; }
  } else {
    const saved = await sbInsert('health_records', {
      emp_id: empId, year: yr, members_json: JSON.stringify(members),
      reserve_date: reserveDate, status: 'pending', approved: false
    });
    if (saved) {
      db.health.push(normalizeHealth({...saved, reserve_date: reserveDate, status:'pending', approved:false, members_json:JSON.stringify(members)}));
    }
  }
  saveAll();
  await notifyHealthChange(empId, members, reserveDate);
  showToast('✅ 건강검진 신청됨 — 관리자 승인 대기');
  closeModal();
  renderHealth();
}

async function saveHealthComplete(empId) {
  const checkupDate = document.getElementById('h-checkup-date')?.value;
  if (!checkupDate) { showToast('수검일을 입력하세요'); return; }
  const yr = currentYear;
  const h = db.health.find(r=>String(r.empId)===String(empId)&&String(r.year)===String(yr));
  if (!h) return;

  // 가족 수검 정보 업데이트
  const famMembers = (h.members||[]).filter(m=>m.relation!=='본인');
  famMembers.forEach((m,i) => {
    const dateEl = document.getElementById(`fam-check-${i}`);
    const doneEl = document.getElementById(`fam-done-${i}`);
    if (dateEl) m.checkupDate = dateEl.value;
    if (doneEl) m.confirmed = doneEl.checked;
  });
  const mainMember = h.members.find(m=>m.relation==='본인')||{relation:'본인'};
  mainMember.checkupDate = checkupDate;
  mainMember.confirmed = true;
  if (!h.members.find(m=>m.relation==='본인')) h.members.unshift(mainMember);

  try {
    const { error } = await _supa.from('health_records').update({
      checkup_date: checkupDate, members_json: JSON.stringify(h.members), status: 'completed'
    }).eq('id', h.id);
    if (error) { console.error('수검완료 오류:', error); showToast('⚠️ 저장 실패: ' + error.message); return; }
    h.checkupDate = checkupDate;
    h.status = 'completed';
    saveAll();
    showToast('✅ 수검 완료 저장됨');
    closeModal();
    renderHealth();
  } catch(e) { console.error('수검완료 예외:', e); showToast('⚠️ 저장 실패'); }
}

// 건강검진 상세 (관리자용 - 가족 추가 등)

async function deleteHealth(empId) {
  if (!confirm('건강검진 신청을 삭제하시겠습니까?')) return;
  const yr = currentYear;
  const h = db.health.find(r => String(r.empId) === String(empId) && String(r.year) === String(yr));
  if (!h) return;
  const { error } = await _supa.from('health_records').delete().eq('id', h.id);
  if (!error) {
    db.health = db.health.filter(r => String(r.id) !== String(h.id));
    saveAll(); showToast('🗑️ 삭제됨');
    // 7번: 관리자에게 삭제 알림
    await notifyHealthChange(empId, [], '', '삭제');
    renderHealth();
  } else { showToast('⚠️ 삭제 실패'); }
}

async function approveHealth(empId) {
  const yr = currentYear;
  const h = db.health.find(r => String(r.empId) === String(empId) && String(r.year) === String(yr));
  if (!h) { showToast('⚠️ 데이터 없음'); return; }
  try {
    const { error } = await _supa.from('health_records').update({ status: 'approved', approved: true }).eq('id', h.id);
    if (error) { console.error('승인 오류:', error); showToast('⚠️ 승인 실패: ' + error.message); return; }
    h.status = 'approved';
    h.approved = true;
    saveAll();
    showToast('✅ 건강검진 승인됨');
  } catch(e) { console.error('승인 예외:', e); showToast('⚠️ 승인 실패'); }
  renderHealth();
}

// ─ 10. 달력 ────────────────────────────────
function renderCalendar(){
  const y=calYear,m=calMonth;
  const first=new Date(y,m-1,1).getDay();
  const last=new Date(y,m,0).getDate();
  const ev={};
  function addEv(ds,label,cls,status='approved',req=null){if(!ev[ds])ev[ds]=[];ev[ds].push({label,cls,status,req});}
  const mStr=`${y}-${String(m).padStart(2,'0')}`;
  // 승인여부 관계없이 canView인 신청 모두 표시
  db.requests.filter(r=>canViewCalendar(r)).forEach(r=>{
    const statusIcon = r.status==='pending'?'⏳':r.status==='rejected'?'❌':'✅';
    if(r.type==='leave')iterDates(r.startDate,r.endDate||r.startDate,ds=>{if(ds.startsWith(mStr))addEv(ds,statusIcon+' '+ename(r.empId)+' '+r.leaveType,'ev-leave',r.status);});
    else if(r.type==='ot'&&(r.date||'').startsWith(mStr))addEv(r.date,statusIcon+' '+ename(r.empId)+' 특근','ev-ot',r.status);
    else if(r.type==='trip')iterDates(r.startDate,r.endDate||r.startDate,ds=>{if(ds.startsWith(mStr))addEv(ds,statusIcon+' '+ename(r.empId)+' 출장','ev-trip',r.status);});
    else if(r.type==='comp')iterDates(r.startDate,r.endDate||r.startDate,ds=>{if(ds.startsWith(mStr))addEv(ds,statusIcon+' '+ename(r.empId)+' 대휴','ev-comp',r.status,r);});
    else if(r.type==='outside')iterDates(r.startDate,r.endDate||r.startDate,ds=>{if(ds.startsWith(mStr))addEv(ds,statusIcon+' '+ename(r.empId)+' 외근','ev-trip',r.status);});
    else if(r.type==='education')iterDates(r.startDate,r.endDate||r.startDate,ds=>{if(ds.startsWith(mStr))addEv(ds,statusIcon+' '+ename(r.empId)+' 교육','ev-ot',r.status);});
  });
  db.events.forEach(ev2=>{
    const ds=getEventDate(ev2,y);
    if(ds&&ds.startsWith(mStr)) {
      const emp4 = eid(ev2.empId);
      const isWelfare4 = emp4 && (
        (emp4.anniversaryType==='birthday' && ev2.type==='birthday') ||
        (emp4.anniversaryType==='anniversary' && ev2.type==='anniversary')
      );
      addEv(ds,(ev2.type==='birthday'?'🎂 ':'🎉 ')+ev2.name+(isWelfare4?' ⭐':''),'ev-bday');
    }
  });
  db.health.filter(h=>String(h.year)===String(y)).forEach(h=>{
    (h.members||[]).forEach(mem=>{
      if(mem.checkupDate&&mem.checkupDate.startsWith(mStr))addEv(mem.checkupDate,'🏥 '+ename(h.empId)+' 검진','ev-health');
    });
  });
  window._calEv = {}; // 초기화
  Object.assign(window._calEv, ev); // 이벤트 다 채운 후 저장
  const todayDateStr=todayStr();
  const total=Math.ceil((first+last)/7)*7;
  let cells='';
  for(let i=0;i<total;i++){
    const dn=i-first+1;const inM=dn>=1&&dn<=last;
    const ds=inM?`${y}-${String(m).padStart(2,'0')}-${String(dn).padStart(2,'0')}`:'';
    const dow=i%7;const evList=ds&&ev[ds]?ev[ds]:[];
    const clickHandler = inM&&evList.length>0 ? `onclick="openDayDetail('${ds}')"` : '';
    cells+=`<div class="cal-day${!inM?' other-month':''}${ds===todayDateStr?' today':''}${dow===0?' sun':''}" ${clickHandler} style="${inM&&evList.length>0?'cursor:pointer':''}">
      ${inM?`<div class="dn">${dn}</div>`:''}
      ${evList.slice(0,4).map(e=>`<div class="cal-event ${e.cls}">${e.label}</div>`).join('')}
      ${evList.length>4?`<div style="font-size:10px;color:var(--text3)">+${evList.length-4}건 더보기</div>`:''}
    </div>`;
  }
  // 오늘의 자리비움 / 오늘의 특근 카드
  const todayStr2 = todayStr();
  const todayReqs = db.requests.filter(r => canViewCalendar(r) && r.status !== 'rejected' && (
    (r.type==='leave' && r.startDate<=todayStr2 && (r.endDate||r.startDate)>=todayStr2) ||
    (r.type==='comp' && r.startDate<=todayStr2 && (r.endDate||r.startDate)>=todayStr2) ||
    (r.type==='trip' && r.startDate<=todayStr2 && (r.endDate||r.startDate)>=todayStr2) ||
    (r.type==='ot' && r.date===todayStr2)
  ));

  // 자리비움: 연차, 대휴, 출장
  const absenceToday = todayReqs.filter(r => r.type==='leave'||r.type==='comp'||r.type==='trip'||r.type==='outside'||r.type==='education');
  // 특근: ot
  const otToday = todayReqs.filter(r => r.type==='ot');

  const typeLabel = {leave:'연차',ot:'특근',comp:'대휴',trip:'출장',outside:'외근',education:'교육'};
  const stBadge = r => r.status==='pending'
    ? `<span style="font-size:10px;background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 5px">승인대기</span>`
    : `<span style="font-size:10px;background:#d1fae5;color:#065f46;border-radius:4px;padding:1px 5px">승인</span>`;

  const mkCard = (title, reqs, bg, border, titleColor) => reqs.length === 0 ? '' : `
    <div style="background:${bg};border:1px solid ${border};border-radius:var(--radius);padding:12px 16px;flex:1;min-width:200px">
      <div style="font-size:12px;font-weight:700;color:${titleColor};margin-bottom:8px">📌 ${title} (${reqs.length}명)</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:${4*32}px;overflow-y:auto">
        ${reqs.map(r=>`
          <div style="display:flex;align-items:center;gap:6px;font-size:13px;background:rgba(255,255,255,.6);border-radius:20px;padding:3px 10px 3px 4px;white-space:nowrap">
            ${av(r.empId,22)}
            <span style="font-weight:500">${ename(r.empId)}</span>
            <span style="font-size:11px;color:#64748b">${r.type==='leave'?(r.leaveType||'연차'):typeLabel[r.type]||''}</span>
            ${stBadge(r)}
          </div>`).join('')}
      </div>
    </div>`;

  const todayBannerHtml = (absenceToday.length || otToday.length) ? `
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px">
      ${mkCard('오늘의 자리비움', absenceToday, '#eff6ff', '#93c5fd', '#1d4ed8')}
      ${mkCard('오늘의 특근', otToday, '#fdf4ff', '#d8b4fe', '#7e22ce')}
    </div>` : '';

  // 30일 이내 예정 이벤트 (생일/기념일)
  const todayD2 = parseLocalDate(todayStr());
  // db.events 기준 (올해 지났으면 내년으로)
  const upcoming30 = [];
  db.events.forEach(ev2 => {
    let ds2 = getEventDate(ev2, todayD2.getFullYear());
    if (!ds2) return;
    let diff2 = Math.round((parseLocalDate(ds2) - todayD2) / 864e5);
    if (diff2 < 0) {
      ds2 = getEventDate(ev2, todayD2.getFullYear() + 1);
      if (!ds2) return;
      diff2 = Math.round((parseLocalDate(ds2) - todayD2) / 864e5);
    }
    if (diff2 < 0 || diff2 > 30) return;
    upcoming30.push({ ...ev2, ds: ds2, diff: diff2 });
  });
  // 직원 birthdate 직접 보완 (events 테이블에 없는 경우)
  const evEmpIds30 = new Set(upcoming30.map(ev => String(ev.empId)));
  db.employees.filter(e => e.birthdate && !e.isExternal).forEach(e => {
    if (evEmpIds30.has(String(e.id))) return;
    const parts = e.birthdate.split('-'); if (parts.length < 3) return;
    const m2 = parseInt(parts[1]), d2 = parseInt(parts[2]);
    let ds2 = `${todayD2.getFullYear()}-${String(m2).padStart(2,'0')}-${String(d2).padStart(2,'0')}`;
    let diff2 = Math.round((parseLocalDate(ds2) - todayD2) / 864e5);
    if (diff2 < 0) { ds2 = `${todayD2.getFullYear()+1}-${String(m2).padStart(2,'0')}-${String(d2).padStart(2,'0')}`; diff2 = Math.round((parseLocalDate(ds2) - todayD2) / 864e5); }
    if (diff2 < 0 || diff2 > 30) return;
    upcoming30.push({ id:'bd_'+e.id, empId:e.id, type:'birthday', name:e.name+' 생일', month:m2, day:d2, calType:e.birthdateLunar?'lunar':'solar', ds:ds2, diff:diff2 });
  });
  upcoming30.sort((a,b) => a.diff - b.diff);

  const upcoming30Html = upcoming30.length ? `
    <div style="background:var(--bday-bg);border:1px solid #7dd3fc;border-radius:var(--radius);padding:10px 16px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:600;color:var(--bday);margin-bottom:6px">🗓️ 30일 이내 예정</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:88px;overflow-y:auto">
        ${upcoming30.map(ev2=>{
          const emp30=eid(ev2.empId);
          const isW30=emp30&&((emp30.anniversaryType==='birthday'&&ev2.type==='birthday')||(emp30.anniversaryType==='anniversary'&&ev2.type==='anniversary'));
          return`<span style="background:#fff;border:1px solid #7dd3fc;border-radius:20px;padding:3px 10px;font-size:12px;display:flex;align-items:center;gap:4px;overflow:hidden">
            <span>${ev2.type==='birthday'?'🎂':'🎉'}</span>
            <strong style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev2.name}</strong>${isW30?'⭐':''}
            ${ev2.diff===0?'<span style="color:var(--danger);font-weight:700;white-space:nowrap">오늘!</span>':`<span style="color:var(--text2);white-space:nowrap">D-${ev2.diff}</span>`}
          </span>`;}).join('')}
      </div>
      <div style="font-size:10px;color:var(--text3);margin-top:4px">⭐ 복리후생 지원</div>
    </div>` : '';

  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  setContent(`<div class="card">
    ${todayBannerHtml}
    ${upcoming30Html}
    <div class="cal-nav">
      <button class="btn" style="position:absolute;left:0" onclick="chM(-1)">&#8249;</button>
      <h2>${y}년 ${months[m-1]}</h2>
      <button class="btn btn-sm" style="margin-left:8px;font-size:12px" onclick="calYear=new Date().getFullYear();calMonth=new Date().getMonth()+1;renderCalendar()">오늘</button>
      <button class="btn" style="position:absolute;right:0" onclick="chM(1)">&#8250;</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--leave-bg);border:1px solid var(--leave)"></div>연차</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--ot-bg);border:1px solid var(--ot)"></div>특근</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--trip-bg);border:1px solid var(--trip)"></div>출장</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--comp-bg);border:1px solid var(--comp)"></div>대체휴무</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bday-bg);border:1px solid var(--bday)"></div>생일/기념일</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--health-bg);border:1px solid var(--health)"></div>건강검진</div>

}

async function submitReq(){
  const t=document.getElementById('req-type').value;
  const empId=document.getElementById('f-emp').value;
  const reason=document.getElementById('f-reason')?.value||'';
  const td2=todayStr();
  let r={id:nextId++,type:t,empId,status:'approved',year:currentYear,reason,reqDate:td2};
  if(t==='leave'){
    const s=getDateVal('f-start');if(!s){alert('날짜 입력');return;}
    const e2=getDateVal('f-end')||s;
    const ltSel=document.querySelector('input[name="ltype"]:checked');
    // 중복 체크
    const overlaps = checkLeaveOverlap(empId, s, e2);
    if (overlaps.length > 0) {
      const overlapInfo = overlaps.map(o => '• ' + fmt(o.startDate) + (o.endDate&&o.endDate!==o.startDate?' ~ '+fmt(o.endDate):'') + ' (' + o.leaveType + ', ' + (o.status==='pending'?'승인대기':'승인됨') + ')').join('\n');
      if (!confirm('⚠️ 해당 기간에 이미 신청된 연차가 있습니다:\n\n' + overlapInfo + '\n\n그래도 신청하시겠습니까?')) return;
    }
    Object.assign(r,{startDate:s,endDate:e2,leaveType:ltSel?ltSel.value:'연차',hours:parseInt(document.getElementById('f-hours').value)||8});
  }
  else if(t==='ot'){const date=getDateVal('f-date');if(!date){alert('날짜 입력');return;}const otSel=document.querySelector('input[name="otsub"]:checked');Object.assign(r,{date,otType:otSel?otSel.value:'특근',hours:parseInt(document.getElementById('f-hours').value)||4,useTransport:false});}
  else if(t==='trip'){const s=getDateVal('f-start');if(!s){alert('날짜 입력');return;}Object.assign(r,{startDate:s,endDate:getDateVal('f-end')||s,dest:document.getElementById('f-dest')?.value||''});}
  else if(t==='comp'){const s=getDateVal('f-start');if(!s){alert('날짜 입력');return;}Object.assign(r,{startDate:s,endDate:s,hours:parseInt(document.getElementById('f-hours').value)||8});}
  // Supabase 저장
  const row = reqToDb(r);
  let saved = null;
  if(_supa){
    const {data,error}=await _supa.from('requests').insert(row).select().single();
    if(error){console.error('submitReq error:',error);showToast('⚠️ 저장 실패: '+error.message);return;}
    saved=data;
  }
  if(saved) r.id=saved.id;
  db.requests.unshift(r);
  saveAll();
  showToast('✅ 신청 완료 — 관리자 승인 후 반영됩니다');
  await notifyAdmin(r);
  closeModal();go(currentPage);
}

// ── 연차 중복 체크 ──
function checkLeaveOverlap(empId, startDate, endDate) {
  const end = endDate || startDate;
  const overlaps = db.requests.filter(r => {
    if (String(r.empId) !== String(empId)) return false;
    if (r.type !== 'leave') return false;
    if (r.status === 'rejected') return false; // 반려된 건 제외
    const rEnd = r.endDate || r.startDate;
    // 날짜 범위 겹침 체크
    return r.startDate <= end && rEnd >= startDate;
  });
  return overlaps;
}

// 신청 객체 → DB row 변환
function reqToDb(r) {
  return {
    type:r.type, emp_id:r.empId, status:'pending', year:r.year,
    reason:r.reason||'', req_date:r.reqDate||todayStr(),
    start_date:r.startDate||null, end_date:r.endDate||null,
    leave_type:r.leaveType||null, hours:r.hours||null,
    date:r.date||null, ot_type:r.otType||null,
    use_transport:r.useTransport||false,
    dest:r.dest||null, trip_kind:r.tripKind||null, allowance:r.allowance||0
  };
}

  setTimeout(()=>{
    ['f-start-y','f-start-m','f-start-d','f-end-y','f-end-m','f-end-d'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.addEventListener('input',autoCalcLeaveHours);

function onLtypeChange(){
  const sel=document.querySelector('input[name="ltype"]:checked');
  if(!sel) return;
  const hEl=document.getElementById('f-hours');
  if(!hEl) return;
  if(sel.value==='연차') hEl.value=8;
  else if(sel.value==='반차') hEl.value=4;
  else if(sel.value==='외출') hEl.value=1;
  else if(sel.value==='병가') hEl.value=8;
  else if(sel.value==='특별휴가') hEl.value=8;
}
function autoCalcLeaveHours(){
  const sel=document.querySelector('input[name="ltype"]:checked');
  if(sel&&sel.value!=='연차') return;
  const s=getDateVal('f-start');
  const e=getDateVal('f-end');
  if(!s) return;
  const start=parseLocalDate(s);
  const end=e?parseLocalDate(e):start;
  if(!start||!end||end<start) return;
  const days=Math.round((end-start)/864e5)+1;
  const hEl=document.getElementById('f-hours');
  if(hEl) hEl.value=days*8;
}
async function saveLeave(){
  const s=getDateVal('f-start');if(!s){alert('날짜 입력');return;}

async function saveHealth(){
  _hMembers.forEach((m,i)=>{
    m.birthdate=getDateVal(`hb-${i}`)||m.birthdate||'';
    m.reserveDate=getDateVal(`hr-${i}`)||m.reserveDate||'';

  // 건강검진 신청/변경 시 관리자 이메일 발송

//  1. 연차·대체휴무 만료 (다음해 3월 1일 소멸)
// ══════════════════════════════════════════════
// 이월연차: 전년도 잔여연차 → 당해 3월 1일 소멸
// 이월대체휴무: 전전년도 잔여대체휴무 → 이미 소멸 처리됨
// getCompCarryover: 전년도 잔여만 이월, 단 3월 1일 이후면 소멸

function isAfterMarch1(year) {
  const today = parseLocalDate(todayStr());
  const march1 = new Date(year, 2, 1); // 3월 1일
  return today >= march1;
}

// 이월 연차: 전년도 잔여, 단 당해 3월 1일 이후면 0
function getLeaveCarryoverEffective(empId, year) {
  const a = getAlloc(empId, year);
  const carryover = +a.carryover || 0;
  // 이미 getAlloc에 저장된 carryover를 쓰되, 3월1일 이후면 소멸
  if (carryover > 0 && isAfterMarch1(year)) return 0;
  return carryover;
}

// 이월 대체휴무: 전년도 잔여, 단 당해 3월 1일 이후면 소멸
function getCompCarryoverEffective(empId, year) {
  if (isAfterMarch1(year)) return 0;
  return Math.max(0, getCompEarned(empId, year-1) - getCompUsed(empId, year-1));
}

function getActiveAlerts() {
  const today = todayStr();
  const mmdd = today.slice(5); // MM-DD
  const customAlerts = db.alerts || [];
  // 기본 알람 + 커스텀 알람 합치기
  const allAlerts = [
    ...DEFAULT_ALERTS.map(a => ({...a, isDefault: true})),
    ...customAlerts.map(a => ({...a, isDefault: false}))
  ];
  // 오늘 날짜가 alert date와 일치하는 것만 (MM-DD 형식 비교)
  return allAlerts.filter(a => {
    const aDate = a.date || '';
    // full date (YYYY-MM-DD) 또는 MM-DD 둘 다 지원
    if (aDate.length === 10) return aDate === today;
    if (aDate.length === 5) return aDate === mmdd;
    return false;
  });
}

function updateNoticeAlarmBar() {
  // 공지사항 + 반복알람 상단바 업데이트
  const bar = document.getElementById('notice-alarm-bar');
  const txt = document.getElementById('notice-alarm-bar-text');
  if (!bar || !txt || !currentEmp) return;

  const today = todayStr();
  // 활성 공지사항
  const activeNotices = (db.notices||[]).filter(n => {
    if (!n.startDate || !n.endDate) return false;
    if (today < n.startDate || today > n.endDate) return false;
    if (n.targetIds && n.targetIds.length && !n.targetIds.map(String).includes(String(currentEmp.id))) return false;
    return true;
  });
  // 반복알람 (미발송 예약)
  const pendingSchedules = (db.notifySchedules||[]).filter(s => !s.sent);

  const items = [];
  if (activeNotices.length) items.push(`📢 공지사항 ${activeNotices.length}건`);
  if (pendingSchedules.length && isAdmin) items.push(`🔔 예약알람 ${pendingSchedules.length}건`);

  if (items.length) {
    txt.textContent = items.join('  |  ') + '  ▶ 클릭하여 확인';
    bar.style.display = '';
  } else {
    bar.style.display = 'none';
  }
}

function updateBdayAlarmBar() {
  const bar = document.getElementById('bday-alarm-bar');
  if (!bar) return;
  const yr = currentYear;
  const todayD = parseLocalDate(todayStr());
  const upcoming = db.events.map(ev => {
    const ds = getEventDate(ev, yr); if (!ds) return null;
    const diff = Math.round((parseLocalDate(ds) - todayD) / 864e5);
    if (diff < 0 || diff > 7) return null;
    return { ...ev, ds, diff };
  }).filter(Boolean).sort((a, b) => a.diff - b.diff);

  if (!upcoming.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  const emp4ev = (ev) => eid(ev.empId);
  // 우측 작은 칸 - 첫번째 것만 간략히 표시
  const first = upcoming[0];
  const e0 = emp4ev(first);
  const isW0 = e0 && ((e0.anniversaryType==='birthday'&&first.type==='birthday')||(e0.anniversaryType==='anniversary'&&first.type==='anniversary'));
  bar.textContent = '🎂 ' + first.name + (isW0?' ⭐':'') + ' D-' + first.diff + (upcoming.length>1?` 외 ${upcoming.length-1}건`:'');
}

function previewAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('avatar-preview').innerHTML =
      `<img src="${e.target.result}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border2)">`;
  };
  reader.readAsDataURL(file);
}

async function saveMyProfile() {
  if (!currentEmp) return;
  const e = currentEmp;
  const name     = document.getElementById('mp-name')?.value?.trim() || e.name;
  const position = document.getElementById('mp-position')?.value?.trim() || e.position;
  const dept     = document.getElementById('mp-dept')?.value?.trim() || e.dept;
  const phone    = document.getElementById('mp-phone')?.value?.trim() || '';
  const birth    = getDateVal('mp-birth') || e.birthdate || '';
  const calSel   = document.querySelector('input[name="mp-cal"]:checked');
  const birthdateLunar = calSel ? calSel.value === 'lunar' : false;
  const annexSel = document.querySelector('input[name="mp-anniv"]:checked');
  const anniversaryType = annexSel ? annexSel.value : 'birthday';
  const address  = document.getElementById('mp-address')?.value?.trim() || '';

  // 사진 업로드
  let avatarUrl = e.avatarUrl || '';
  const fileInput = document.getElementById('avatar-file');
  if (fileInput?.files?.length) {
    const file = fileInput.files[0];
    const ext = file.name.split('.').pop();
    const path = `emp_${e.id}_${Date.now()}.${ext}`;
    const { data: upData, error: upErr } = await _supa.storage.from('avatars').upload(path, file, { upsert: true });
    if (!upErr) {
      const { data: urlData } = _supa.storage.from('avatars').getPublicUrl(path);
      avatarUrl = urlData.publicUrl;
    } else { showToast('⚠️ 사진 업로드 실패'); }
  }

  const updates = { name, position, dept, phone, birthdate: birth||null,
    birthdate_lunar: birthdateLunar, anniversary_type: anniversaryType,
    address, avatar_url: avatarUrl };
  await sbUpdate('employees', e.id, updates);

  // 로컬 db 업데이트
  Object.assign(e, { name, position, dept, phone, birthdate:birth, birthdateLunar, anniversaryType, address, avatarUrl });
  const dbEmp = db.employees.find(x=>String(x.id)===String(e.id));
  if (dbEmp) Object.assign(dbEmp, e);

  // 생일/기념일 자동 연동
  await syncBirthdayEvent(e);

  saveAll();
  updateAdminUI();
  showToast('✅ 저장되었습니다');
  renderMyProfile();
}

async function changePassword() {
  const pw1 = document.getElementById('mp-pw1')?.value;
  const pw2 = document.getElementById('mp-pw2')?.value;
  if (!pw1) { showToast('새 비밀번호를 입력하세요'); return; }
  if (pw1.length < 6) { showToast('비밀번호는 6자 이상이어야 합니다'); return; }
  if (pw1 !== pw2) { showToast('⚠️ 비밀번호가 일치하지 않습니다'); return; }
  const { error } = await _supa.auth.updateUser({ password: pw1 });
  if (error) { showToast('⚠️ 변경 실패: ' + error.message); }
  else {
    showToast('✅ 비밀번호가 변경되었습니다');
    document.getElementById('mp-pw1').value = '';
    document.getElementById('mp-pw2').value = '';
  }
}

function checkHealthCheckupAlert() {
  if (!currentEmp) return;
  const yr = currentYear;
  const h = db.health.find(r => String(r.empId) === String(currentEmp.id) && String(r.year) === String(yr));
  if (!h || h.status === 'completed' || !h.approved) return;
  if (!h.reserveDate) return;
  // 예약일이 오늘 이전인 경우만
  if (h.reserveDate >= todayStr()) return;
  // 이미 오늘 알림 봤으면 스킵
  const skipKey = `health_alert_${currentEmp.id}_${todayStr()}`;
  if (localStorage.getItem(skipKey)) return;

  // 예약일 파싱
  const rd = h.reserveDate.split('-');
  const rMonth = parseInt(rd[1]);
  const rDay   = parseInt(rd[2]);

  const popup = document.getElementById('health-alert-popup');
  const content = document.getElementById('health-alert-content');
  if (popup && content) {
    content.innerHTML = `
      <div style="font-size:24px;text-align:center;margin-bottom:12px">🏥</div>
      <div style="font-size:16px;font-weight:700;text-align:center;margin-bottom:16px;color:var(--health)">건강검진 수검 확인</div>
      <p style="font-size:14px;text-align:center;margin-bottom:8px;color:var(--text)">건강검진 예약일 : <strong>${rMonth}월 ${rDay}일</strong></p>
      <p style="font-size:13px;text-align:center;margin-bottom:20px;color:var(--text2)">건강검진을 받으셨다면<br>수검완료를 클릭해 주세요!</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary" style="width:100%;background:var(--health);border-color:var(--health)"
          onclick="closeHealthAlert();openHealthComplete(${currentEmp.id})">
          ✅ 수검완료 입력하기
        </button>
        <button class="btn" style="width:100%" onclick="closeHealthAlert()">나중에 하기</button>
      </div>`;
    popup.style.cssText = 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2001;align-items:center;justify-content:center';
    localStorage.setItem(skipKey, '1');
  }
}

function closeHealthAlert() {
  const popup = document.getElementById('health-alert-popup');
  if (popup) popup.style.display = 'none';
}

function checkAndShowNotice() {
  if (!currentEmp) return;
  const today = todayStr();
  const now = new Date();
  const activeNotices = (db.notices||[]).filter(n => {
    if (!n.startDate || !n.endDate) { return false; }
    if (today < n.startDate || today > n.endDate) { return false; }
    if (n.targetIds && n.targetIds.length && !n.targetIds.map(String).includes(String(currentEmp.id))) { return false; }
    const skipKey = `notice_skip_${n.id}_${today}`;
    if (localStorage.getItem(skipKey)) { return false; }
    return true;
  });
  if (!activeNotices.length) return;
  // 가장 최신 공지 표시
  const notice = activeNotices[0];
  const popupContent = document.getElementById('notice-popup-content');
  if (!popupContent) return;
  popupContent.innerHTML = `
    <div style="font-size:16px;font-weight:700;margin-bottom:12px;color:var(--accent)">📢 공지사항</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:10px">${notice.title}</div>
    <div style="font-size:14px;line-height:1.8;white-space:pre-wrap;color:var(--text)">${notice.content}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:10px">게시기간: ${fmt(notice.startDate)} ~ ${fmt(notice.endDate)}</div>
  `;
  const popupBg = document.getElementById('notice-popup-bg');
  if (!popupBg) return;
  popupBg.style.cssText = 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center';
  popupBg._noticeId = notice.id;
}

function closeNoticePopup() {
  const bg = document.getElementById('notice-popup-bg');
  const noToday = document.getElementById('notice-no-today')?.checked;
  if (noToday && bg._noticeId) {
    localStorage.setItem(`notice_skip_${bg._noticeId}_${todayStr()}`, '1');
  }
  bg.style.display = 'none';
}

async function saveNotice() {
  const title = document.getElementById('notice-title')?.value?.trim();
  const content = document.getElementById('notice-content')?.value?.trim();
  const dur = parseInt(document.querySelector('input[name="notice-dur"]:checked')?.value || '1');
  if (!title || !content) { showToast('제목과 내용을 입력하세요'); return; }
  const targets = [...document.querySelectorAll('.notice-target:checked')].map(c => c.value);
  // (notice-target 클래스 사용)
  const start = todayStr();
  const endD = new Date(); endD.setDate(endD.getDate() + dur - 1);
  const end = endD.toISOString().slice(0,10);
  const row = { title, content, duration: dur, target_ids: JSON.stringify(targets), start_date: start, end_date: end };
  const saved = await sbInsert('notices', row);
  if (saved) {
    db.notices.unshift({ id: saved.id, title, content, duration: dur, targetIds: targets, startDate: start, endDate: end, createdAt: saved.created_at });
    showToast('✅ 공지사항 등록됨');
    // 탭 내 콘텐츠만 갱신 (renderNotifySetting 대신)
    const ec = document.getElementById('notify-extra-content');
    if (ec) ec.innerHTML = renderNoticeManage();
    else renderNotifySetting();
  } else { showToast('⚠️ 등록 실패'); }
}

async function deleteNotice(id) {
  if (!confirm('공지사항을 삭제하시겠습니까?')) return;
  await sbDelete('notices', id);
  db.notices = db.notices.filter(n => String(n.id) !== String(id));
  showToast('🗑️ 삭제됨');
  updateNoticeAlarmBar();
  if (document.getElementById('page-title')?.textContent === '공지사항') renderNoticeBoard();
  else renderNotifySetting();
}

        <td style="font-size:12px;color:var(--text2)">${s.sendAt?fmtDateTime(s.sendAt):'즉시'}</td>
        <td style="font-size:12px">${JSON.parse(s.targetIds||'[]').length}명</td>
        <td>${!s.sent?`<button class="btn btn-sm btn-danger" onclick="cancelSchedule(${s.id})">취소</button>`:''}</td>
      </tr>`).join('') || `<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:16px">예약된 알람 없음</td></tr>`;

    setContent(`
      <div class="card" style="margin-bottom:10px">
        <div class="card-title">📢 팝업 공지사항
          <button class="btn btn-sm btn-primary" onclick="go('notifysetting')">+ 공지 등록</button>

          <thead><tr><th>상태</th><th>제목</th><th>게시기간</th><th>대상</th><th></th></tr></thead>

        <div class="card-title">🔔 반복 알람 내역
          <button class="btn btn-sm btn-primary" onclick="go('notifysetting')">+ 알람 등록</button>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>상태</th><th>제목</th><th>발송시각</th><th>대상</th><th></th></tr></thead>
          <tbody>${scheduleRows}</tbody>
        </table></div>
      </div>
    `);
  } else {
    // 일반 직원: 본인에게 온 공지만 열람
    const myNotices = (db.notices||[]).filter(n => {
      if (!n.targetIds?.length) return true; // 전체 대상

    const rows = myNotices.map(n => {

          <thead><tr><th>제목</th><th>상태</th><th>답변수</th><th>접수일시</th></tr></thead>

        </table></div>

function fmtDateTime(dt) {
  if (!dt) return '—';
  const d = new Date(dt);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function openNewInquiry() {
  openModal(`
    <div class="modal-title">1:1 문의 작성</div>
    <div class="field" style="margin-bottom:12px">
      <label>제목</label>
      <input id="inq-title" placeholder="문의 제목을 입력하세요">

async function submitInquiry() {
  if (!currentEmp) return;
  const title = document.getElementById('inq-title')?.value?.trim();
  const content = document.getElementById('inq-content')?.value?.trim();
  if (!title) { showToast('제목을 입력하세요'); return; }
  if (!content) { showToast('내용을 입력하세요'); return; }
  const row = { emp_id: currentEmp.id, title, content, status: 'pending' };
  const saved = await sbInsert('inquiries', row);
  if (saved) {
    db.inquiries.unshift({ id: saved.id, empId: currentEmp.id, title, content, status: 'pending', createdAt: saved.created_at });
    showToast('✅ 문의가 접수되었습니다');
    closeModal();
    renderInquiry();
  } else { showToast('⚠️ 제출 실패'); }
}

function openInquiryDetail(inqId) {

async function editInquiry(inqId) {
  const inq = db.inquiries.find(x => String(x.id) === String(inqId));
  if (!inq) return;
  openModal(`
    <div class="modal-title">문의 수정</div>
    <div class="field" style="margin-bottom:12px">
      <label>제목</label>
      <input id="edit-inq-title" value="${inq.title}">
    </div>
    <div class="field" style="margin-bottom:16px">
      <label>내용</label>
      <textarea id="edit-inq-content" rows="6"
        style="width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;resize:vertical">${inq.content}</textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEditInquiry(${inqId})">저장</button>
    </div>

}

async function saveEditInquiry(inqId) {
  const title = document.getElementById('edit-inq-title')?.value?.trim();
  const content = document.getElementById('edit-inq-content')?.value?.trim();
  if (!title || !content) { showToast('제목과 내용을 입력하세요'); return; }
  const ok = await sbUpdate('inquiries', inqId, { title, content });
  if (ok) {
    const inq = db.inquiries.find(x => String(x.id) === String(inqId));
    if (inq) { inq.title = title; inq.content = content; }
    showToast('✅ 수정되었습니다');
    closeModal();
    renderInquiry();
  } else { showToast('⚠️ 수정 실패'); }
}

async function deleteInquiry(inqId) {
  if (!confirm('문의를 삭제하시겠습니까?')) return;
  // 답변 먼저 삭제
  const repIds = db.inquiryReplies.filter(r => String(r.inquiryId) === String(inqId)).map(r => r.id);
  for (const rid of repIds) { await sbDelete('inquiry_replies', rid); }
  db.inquiryReplies = db.inquiryReplies.filter(r => String(r.inquiryId) !== String(inqId));
  // 문의 삭제
  await sbDelete('inquiries', inqId);
  db.inquiries = db.inquiries.filter(x => String(x.id) !== String(inqId));
  showToast('🗑️ 삭제되었습니다');
  closeModal();
  renderInquiry();
}

async function submitReply(inqId) {
  const content = document.getElementById('inq-reply')?.value?.trim();
  if (!content) { showToast('내용을 입력하세요'); return; }
  const row = { inquiry_id: inqId, emp_id: currentEmp?.id || null, is_admin: isAdmin, content };
  const saved = await sbInsert('inquiry_replies', row);
  if (saved) {
    db.inquiryReplies.push({ id: saved.id, inquiryId: inqId, empId: currentEmp?.id, isAdmin, content, createdAt: saved.created_at });
    // 관리자가 답변하면 상태 변경
    if (isAdmin) {
      await sbUpdate('inquiries', inqId, { status: 'answered' });
      const inq = db.inquiries.find(x => String(x.id) === String(inqId));
      if (inq) inq.status = 'answered';
    }
    showToast('✅ 등록되었습니다');
    closeModal();
    openInquiryDetail(inqId);
  } else { showToast('⚠️ 등록 실패'); }
}

// 직책 정렬 순서
const POS_ORDER = ['대표이사','고문','감사','부사장','전무','상무','이사','부장','차장','과장','대리','주임','사원'];
function sortByPosition(emps) {
  return emps.slice().sort((a,b) => {
    const ai = POS_ORDER.findIndex(p => (a.position||'').includes(p));
    const bi = POS_ORDER.findIndex(p => (b.position||'').includes(p));
    return (ai===-1?99:ai) - (bi===-1?99:bi);
  });
}

function makeTargetSelector(cls='notify-target') {
  const validEmps = sortByPosition(db.employees.filter(e => !e.isExternal && e.email));
  const depts = [...new Set(validEmps.map(e => e.dept).filter(Boolean))].sort();
  const positions = [...new Set(validEmps.map(e => e.position).filter(Boolean))].sort((a,b)=>{
    const ai=POS_ORDER.findIndex(p=>a.includes(p)); const bi=POS_ORDER.findIndex(p=>b.includes(p));
    return (ai===-1?99:ai)-(bi===-1?99:bi);
  });
  const deptBtns = depts.map(d=>`<button class="btn btn-sm" style="font-size:11px" onclick="selectNotifyGroup('dept','${d}','${cls}')">${d}</button>`).join(' ');
  const posBtns = positions.map(p=>`<button class="btn btn-sm" style="font-size:11px" onclick="selectNotifyGroup('position','${p}','${cls}')">${p}</button>`).join(' ');
  const empChk = validEmps.map(e=>`
    <label style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:13px">
      <input type="checkbox" class="${cls}" value="${e.id}" data-email="${e.email}" data-dept="${e.dept||''}" data-position="${e.position||''}" style="width:15px;height:15px">
      ${av(e.id,22)} ${e.name} <span style="color:var(--text3);font-size:12px">${e.dept} · ${e.position}</span>
    </label>`).join('');
  return `
    <div style="font-size:13px;font-weight:600;margin-bottom:6px">대상자 선택</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px">
      <button class="btn btn-sm" onclick="document.querySelectorAll('.${cls}').forEach(c=>c.checked=true)">전체 선택</button>
      <button class="btn btn-sm" onclick="document.querySelectorAll('.${cls}').forEach(c=>c.checked=false)">전체 해제</button>
    </div>
    ${depts.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px"><span style="font-size:11px;color:var(--text3);padding:2px 4px">부서</span>${deptBtns}</div>`:''}
    ${positions.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px"><span style="font-size:11px;color:var(--text3);padding:2px 4px">직책</span>${posBtns}</div>`:''}
    <div style="border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;max-height:180px;overflow-y:auto">${empChk}</div>`;
}

let _notifyTab = 'leave';
function switchNotifyTab(tab, btn) {
  _notifyTab = tab;
  document.querySelectorAll('#notify-tabs .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const notifyBody  = document.getElementById('notify-body');
  const extraContent = document.getElementById('notify-extra-content');
  const scheduleCard = document.getElementById('notify-schedule-card');
  const wrap = document.getElementById('notify-content2-wrap');
  const preview = document.getElementById('notify-content2-preview');

  if (tab === 'notice') {
    if (notifyBody) notifyBody.style.display = 'none';
    if (scheduleCard) scheduleCard.style.display = 'none';
    if (extraContent) extraContent.innerHTML = renderNoticeManage();
  } else if (tab === 'alerts') {
    if (notifyBody) notifyBody.style.display = 'none';
    if (scheduleCard) scheduleCard.style.display = 'none';
    if (extraContent) extraContent.innerHTML = renderAlertsInline();
  } else {
    if (notifyBody) notifyBody.style.display = '';
    if (scheduleCard) scheduleCard.style.display = '';
    if (extraContent) extraContent.innerHTML = '';
    // 탭 전환 시 제목/내용 초기화 (7~8번)
    const titleEl = document.getElementById('notify-title');
    const content1El = document.getElementById('notify-content1');
    if (titleEl) titleEl.value = '';
    if (content1El) content1El.value = '';
    // 내용2 표시 여부
    if (wrap) wrap.style.display = tab === 'etc' ? 'none' : '';
    // 내용2 미리보기 탭별 업데이트
    if (preview) {
      if (tab === 'leave') preview.innerHTML = '예) 홍길동님의 잔여 연차: <strong>5일 (40h)</strong>';
      else if (tab === 'comp') preview.innerHTML = '예) 홍길동님의 잔여 대체휴무: <strong>16h</strong>';
    }
  }
}

async function sendNotifyEmail() {
  const title = document.getElementById('notify-title')?.value?.trim();
  const content1 = document.getElementById('notify-content1')?.value?.trim();
  if (!title) { showToast('제목을 입력하세요'); return; }
  if (!content1) { showToast('내용1을 입력하세요'); return; }

  const targets = [...document.querySelectorAll('.notify-target:checked')].map(cb => ({
    id: cb.value, email: cb.dataset.email
  }));
  if (!targets.length) { showToast('대상자를 선택하세요'); return; }

  const sendType = document.querySelector('input[name="notify-send-type"]:checked')?.value;
  const yr = currentYear;

  if (sendType === 'schedule') {
    // 예약 전송 저장
    const dateVal = document.getElementById('notify-schedule-date')?.value;
    const timeVal = document.getElementById('notify-schedule-time')?.value || '09:00';
    if (!dateVal) { showToast('예약 날짜를 선택하세요'); return; }
    const sendAt = new Date(`${dateVal}T${timeVal}:00`).toISOString();
    const row = { type: _notifyTab, title, content1, target_ids: JSON.stringify(targets.map(t=>t.id)), send_at: sendAt, is_immediate: false, sent: false };
    const saved = await sbInsert('notify_schedules', row);
    if (saved) {
      (db.notifySchedules = db.notifySchedules || []).push({ ...row, id: saved.id, sendAt });
      showToast(`✅ ${dateVal} ${timeVal} 예약 완료`);
      document.getElementById('notify-schedule-list').innerHTML = renderNotifyScheduleList();
    }
    return;
  }

  // 바로 전송

async function syncBirthdayEvent(e) {
  // 이 직원의 birthday 이벤트 전체 조회 (중복 포함)
  const allBirthdays = db.events.filter(ev =>
    String(ev.empId) === String(e.id) && ev.type === 'birthday'
  );

  // 생일 정보 없으면 → 전부 삭제
  if (!e.birthdate) {
    for (const ev of allBirthdays) {
      await sbDelete('events', ev.id);
    }
    db.events = db.events.filter(ev =>
      !(String(ev.empId) === String(e.id) && ev.type === 'birthday')
    );
    return;
  }

  const parts = e.birthdate.split('-');
  if (parts.length < 3) return;
  const month   = parseInt(parts[1]);
  const day     = parseInt(parts[2]);
  const calType = e.birthdateLunar ? 'lunar' : 'solar';
  const evName  = e.name + ' 생일';

  if (allBirthdays.length === 0) {
    // 없으면 새로 생성
    const saved = await sbInsert('events', {
      emp_id: e.id, type: 'birthday', name: evName, month, day, cal_type: calType, note: ''
    });
    if (saved) {
      db.events.push({ id: saved.id, empId: e.id, type: 'birthday', name: evName, month, day, calType, note: '' });
    }
  } else {
    // 첫 번째만 업데이트, 나머지 중복 삭제
    const keep = allBirthdays[0];
    const dups = allBirthdays.slice(1);
    for (const dup of dups) {
      await sbDelete('events', dup.id);
    }
    db.events = db.events.filter(ev =>
      !dups.some(d => String(d.id) === String(ev.id))
    );
    keep.name = evName; keep.month = month; keep.day = day; keep.calType = calType;
    await sbUpdate('events', keep.id, {
      name: evName, month, day, cal_type: calType, type: 'birthday', note: keep.note || ''
    });
  }
  saveAll();
}
