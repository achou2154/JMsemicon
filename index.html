<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f9f8f5;--border:#e8e6df;--border2:#d4d1c8;
  --text:#1a1916;--text2:#6b6860;--text3:#9b9890;
  --accent:#2d5a8e;--accent-light:#e8f0f9;--accent2:#1a3d5c;
  --leave:#2e7d52;--leave-bg:#eaf5ef;
  --ot:#b45309;--ot-bg:#fef3e2;
  --trip:#6d28d9;--trip-bg:#f3f0ff;
  --comp:#be185d;--comp-bg:#fdf2f8;
  --bday:#0369a1;--bday-bg:#e0f2fe;
  --health:#0f766e;--health-bg:#f0fdfa;
  --danger:#c0392b;--danger-bg:#fdf0ef;
  --warn:#d97706;--warn-bg:#fffbeb;
  --ok:#15803d;--ok-bg:#f0fdf4;
  --radius:8px;--radius-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{cursor:pointer;font-family:inherit;font-size:13px}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 18px 12px;border-bottom:1px solid var(--border)}
.logo h1{font-size:15px;font-weight:700;color:var(--accent)}
.logo p{font-size:11px;color:var(--text3);margin-top:2px}
.sync-row{display:flex;align-items:center;gap:5px;margin-top:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#22c55e;animation:pulse 2s infinite}
.sync-dot.err{background:#ef4444}
.sync-dot.loading{background:#f59e0b;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:10px;color:var(--text3)}
.nav-wrap{padding:8px 6px;flex:1;overflow-y:auto;padding-bottom:80px}
.nav-sec{padding:10px 8px 3px;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;margin:1px 0;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{position:sticky;bottom:0;padding:10px;border-top:1px solid var(--border);background:var(--surface);z-index:100}
.footer-btns{display:flex;gap:5px;margin-bottom:8px}
.footer-btn{flex:1;padding:5px 0;font-size:11px;border:1px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);text-align:center}
.footer-btn:hover{background:var(--bg)}

.mode-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border-radius:var(--radius)}
.mode-label{font-size:12px;color:var(--text2)}
.mode-btn{font-size:11px;padding:3px 9px;border:1px solid var(--border2);border-radius:5px;background:var(--surface);color:var(--text)}
.admin-chip{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--accent);color:#fff;font-weight:600}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow-y:auto;height:100vh;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:15px;font-weight:600;padding-left:36px}
.topbar-right{display:flex;align-items:center;gap:10px}
select.yr{padding:5px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text)}
.content{flex:1;overflow-y:auto;padding:22px}

/* Setup banner */
.setup-banner{background:#fff8e6;border:1px solid #fcd34d;border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px}
.setup-banner h2{font-size:15px;font-weight:600;margin-bottom:8px;color:#92400e}
.setup-url-row{display:flex;gap:8px;margin-top:10px}
.setup-url-row input{flex:1;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:monospace}
.setup-url-row button{padding:8px 16px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:13px}

/* Cards, tables, badges, buttons — same as before */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:5px}
.stat-val{font-size:22px;font-weight:700}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.stat-card.leave .stat-val{color:var(--leave)}
.stat-card.ot .stat-val{color:var(--ot)}
.stat-card.trip .stat-val{color:var(--trip)}
.stat-card.comp .stat-val{color:var(--comp)}
.stat-card.health .stat-val{color:var(--health)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:11px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.table-wrap{overflow-x:auto}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-leave{background:var(--leave-bg);color:var(--leave)}
.badge-ot{background:var(--ot-bg);color:var(--ot)}
.badge-trip{background:var(--trip-bg);color:var(--trip)}
.badge-comp{background:var(--comp-bg);color:var(--comp)}
.badge-bday{background:var(--bday-bg);color:var(--bday)}
.badge-health{background:var(--health-bg);color:var(--health)}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-neutral{background:var(--bg);color:var(--text2);border:1px solid var(--border2)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:var(--danger);border-color:#e8a09a}.btn-danger:hover{background:var(--danger-bg)}
.btn-ok{color:var(--ok);border-color:#86efac}.btn-ok:hover{background:var(--ok-bg)}
.btn-warn{color:var(--warn);border-color:#fcd34d}.btn-warn:hover{background:var(--warn-bg)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.col1{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:var(--text2);font-weight:500}
.field input,.field select{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
/* 커스텀 날짜 입력 */
.date-input-wrap{display:inline-flex;align-items:center;gap:2px;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;background:var(--surface);font-size:13px;color:var(--text);width:100%}
.date-input-wrap:focus-within{border-color:var(--accent)}
.date-seg{border:none;outline:none;background:transparent;font-size:13px;color:var(--text);font-family:inherit;text-align:center;padding:0;min-width:0;caret-color:var(--accent)}
.date-seg::placeholder{color:var(--text3)}
.date-sep{color:var(--text3);font-size:13px;padding:0 2px;user-select:none;flex-shrink:0}
.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.name-cell{display:flex;align-items:center;gap:8px}
.info-bar{border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:12px}
.req-filter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:12px;color:var(--text2)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.row-pending td{background:#fffdf5}
.prog-bar-wrap{background:var(--bg);border-radius:99px;height:6px;width:80px;display:inline-block;vertical-align:middle;overflow:hidden}
.prog-bar{height:100%;border-radius:99px;background:var(--leave)}
.empty-row td{text-align:center;color:var(--text3);padding:32px}
/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:center;margin-bottom:14px;position:relative}
.cal-nav h2{font-size:15px;font-weight:600;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
@media(max-width:768px){
  .cal-grid{gap:2px}
  .cal-day{min-height:0 !important;aspect-ratio:1/1.1;padding:2px 3px !important;font-size:10px !important}
  .cal-day .dn{font-size:11px !important}
  .cal-event{font-size:9px !important;padding:1px 2px !important}
}
.cal-dow{text-align:center;font-size:11px;color:var(--text3);font-weight:600;padding:4px 0 8px}
.cal-day{min-height:72px;border:1px solid var(--border);border-radius:6px;padding:4px 5px;background:var(--surface);font-size:11px;box-sizing:border-box}
.cal-day.today{border-color:var(--accent)}
.cal-day.other-month{background:var(--surface2);opacity:.5}
.cal-day .dn{font-weight:600;margin-bottom:2px;font-size:12px}
.cal-day.today .dn{color:var(--accent)}
.cal-day.sun .dn{color:#e11d48}
.cal-event{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-leave{background:var(--leave-bg);color:var(--leave)}
.ev-ot{background:var(--ot-bg);color:var(--ot)}
.ev-trip{background:var(--trip-bg);color:var(--trip)}
.ev-comp{background:var(--comp-bg);color:var(--comp)}
.ev-bday{background:var(--bday-bg);color:var(--bday)}
.ev-health{background:var(--health-bg);color:var(--health)}
.legend{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:28px 32px;width:480px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal.modal-lg{width:800px !important;max-width:95vw !important;max-height:90vh !important}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:20px 24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.upcoming-chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;background:#fef9c3;color:#854d0e;margin-left:5px}
.health-ok{color:var(--ok)}
.health-warn{color:var(--warn)}
.health-danger{color:var(--danger)}
.health-none{color:var(--text3)}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->

// ═══════════════════════════════════════════════

  ['#fce7f3','#831843'],['#ecfdf5','#065f46'],
];
const LUNAR_NEW_YEAR = {
  2026:'2026-02-17',2027:'2027-02-06',2028:'2028-01-26',2029:'2029-02-13',
  2030:'2030-02-03',2031:'2031-01-23',2032:'2032-02-11',2033:'2033-01-31',
  2034:'2034-02-19',2035:'2035-02-08',2036:'2036-01-28',2037:'2037-02-15',

};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentPage = 'overview';
let currentYear = 2026;
let calYear = 2026, calMonth = new Date().getMonth()+1;
let reqFilter = 'all', reqTypeFilter = 'all';
let nextId = 100, nextEventId = 100, nextHealthId = 100;

let db = {
  employees: [], leaveAlloc: [], requests: [], events: [], health: [],
  alerts: [],       // 관리자 설정 알람 [{id, date, title, content, color}]
  inquiries: [],    // 1:1 문의
  inquiryReplies: [], // 1:1 문의 답변
  notices: []       // 팝업 공지사항
};

// ══════════════════════════════════════════════
//  SUPABASE CONFIG
//  ★ 아래 두 값을 Supabase 프로젝트에서 복사해 입력하세요 ★
// ══════════════════════════════════════════════
const SUPA_URL = localStorage.getItem('supa_url') || 'https://qghaycyehvwkozoqpqch.supabase.co';
const SUPA_KEY = localStorage.getItem('supa_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnaGF5Y3llaHZ3a296b3FwcWNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDQ1NzcsImV4cCI6MjA5Njc4MDU3N30.BQgl51KjeSsgGKT458x5VuubEgjMcmMccZxuR6pf_bY';
let _supa = null;

function initSupabase() {
  if (!SUPA_URL || !SUPA_KEY) return false;
  if (_supa) return true;
  if (typeof window.supabase !== 'undefined') {
    _supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    return true;
  }
  return false;
}

// ══════════════════════════════════════════════
//  AUTH STATE
// ══════════════════════════════════════════════
let currentUser = null;   // Supabase user object
let currentEmp  = null;   // employees row
let isAdmin     = false;

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot ' + state;
  if (state === 'ok')      lbl.textContent = '연결됨';
  if (state === 'err')     lbl.textContent = '연결 실패';
  if (state === 'loading') lbl.textContent = '로딩 중...';
  if (state === '')        lbl.textContent = '미연결';
}

// ══════════════════════════════════════════════
//  SUPABASE DATA LAYER
// ══════════════════════════════════════════════
async function loadAllData() {
  if (!_supa) return;
  setSyncStatus('loading');
  try {
    // 핵심 테이블 먼저 로드
    const [emp, la, req, ev, health, alerts] = await Promise.all([
      _supa.from('employees').select('*'),
      _supa.from('leave_alloc').select('*'),
      _supa.from('requests').select('*').order('id', {ascending:false}),
      _supa.from('events').select('*'),
      _supa.from('health_records').select('*'),
      _supa.from('alerts').select('*').order('date'),
    ]);
    db.employees  = (emp.data    || []).map(normalizeEmp);
    db.leaveAlloc = (la.data     || []).map(normalizeLa);
    db.requests   = (req.data    || []).map(normalizeReq);
    db.events     = (ev.data     || []).map(normalizeEv);
    db.health     = (health.data || []).map(normalizeHealth);
    db.alerts     = (alerts.data || []);
    // 부가 테이블 별도 로드 (실패해도 계속 진행)
    try {
      const [inq, rep, noticeRes] = await Promise.all([
        _supa.from('inquiries').select('*').order('created_at', {ascending:false}),
        _supa.from('inquiry_replies').select('*').order('created_at', {ascending:true}),
        _supa.from('notices').select('*').order('created_at', {ascending:false}),
      ]);
      db.inquiries      = (inq.data    || []).map(r=>({id:r.id,empId:r.emp_id,title:r.title,content:r.content,status:r.status,createdAt:r.created_at}));
      db.inquiryReplies = (rep.data    || []).map(r=>({id:r.id,inquiryId:r.inquiry_id,empId:r.emp_id,isAdmin:r.is_admin,content:r.content,createdAt:r.created_at}));
      db.notices        = (noticeRes.data || []).map(r=>({id:r.id,title:r.title,content:r.content,duration:r.duration,targetIds:JSON.parse(r.target_ids||'[]'),startDate:r.start_date,endDate:r.end_date,createdAt:r.created_at}));
    } catch(e2) { console.warn('부가 테이블 로드 실패 (무시):', e2); }
    recalcNextIds();
    setSyncStatus('ok');
    saveCache(); // 삭제/변경사항이 반영된 최신 상태를 캐시에 저장
  } catch(e) {
    console.warn('loadAllData error:', e);
    setSyncStatus('err');
    loadFromCache();
  }
}

// ── 컬럼명 변환 (snake_case → camelCase) ──
function normalizeEmp(r) {
  return { id:r.id, user_id:r.user_id, name:r.name, dept:r.dept,
    position:r.position, phone:r.phone, email:r.email,
    joinDate:r.join_date||'', isExternal:r.is_external||false,
    birthdate:r.birthdate||'', birthdateLunar:r.birthdate_lunar||false,
    address:r.address||'', avatarUrl:r.avatar_url||'',
    anniversaryType:r.anniversary_type||'birthday' };
}
function normalizeLa(r) {
  return { id:r.id, empId:r.emp_id, year:r.year, total:r.total||0, carryover:r.carryover||0, extinct:r.extinct||0 };
}
function normalizeReq(r) {
  return { id:r.id, type:r.type, empId:r.emp_id, status:r.status, year:r.year,
    reason:r.reason||'', reqDate:r.req_date||'', startDate:r.start_date||'',
    endDate:r.end_date||'', leaveType:r.leave_type||'', hours:r.hours||0,
    date:r.date||'', otType:r.ot_type||'', useTransport:r.use_transport||false,
    dest:r.dest||'', tripKind:r.trip_kind||'', allowance:r.allowance||0 };
}
function normalizeEv(r) {
  return { id:r.id, empId:r.emp_id||0, type:r.type, name:r.name,
    month:r.month, day:r.day, calType:r.cal_type||'solar', note:r.note||'' };
}
function normalizeHealth(r) {
  let members = [];
  try { members = JSON.parse(r.members_json||'[]'); } catch {}
  return {
    id: r.id, empId: r.emp_id, year: r.year, members,
    approved: r.approved||false,
    status: r.status||'pending',
    reserveDate: r.reserve_date||'',
    checkupDate: r.checkup_date||''
  };
}

async function sbInsert(table, row) {
  if (!_supa) return null;
  const { data, error } = await _supa.from(table).insert(row).select().single();
  if (error) { console.error('insert error:', error); return null; }
  return data;
}
async function sbUpdate(table, id, row) {
  if (!_supa) return;
  const { error } = await _supa.from(table).update(row).eq('id', id);
  if (error) console.error('update error:', error);
}
async function sbDelete(table, id) {
  if (!_supa) return null;
  const { error } = await _supa.from(table).delete().eq('id', id);
  if (error) { console.error('delete error:', error); return null; }
  return true;
}

// ── 관리자 이메일 알림 ──
// 관리자 이메일 목록 (Supabase admins 테이블에서 로드)
let adminEmails = [];

async function loadAdminEmails() {
  if (!_supa) return;
  try {
    // admins 테이블의 user_id로 employees 테이블에서 이메일 조회
    const { data } = await _supa.from('admins').select('user_id');
    if (!data || !data.length) return;
    const adminUserIds = data.map(a => a.user_id);
    // 직원 전체에서 admin user_id와 일치하는 이메일 찾기
    const { data: empData } = await _supa.from('employees').select('user_id, email');
    if (empData) {
      adminEmails = empData
        .filter(e => adminUserIds.includes(e.user_id) && e.email)
        .map(e => e.email);
    }
  } catch(e) { console.warn('관리자 이메일 로드 실패:', e); }
}

async function notifyAdmin(req) {
  if (!_supa || !adminEmails.length) return;
  const typeMap = { leave:'연차', ot:'특근', comp:'대체휴무', trip:'출장', outside:'외근', education:'교육' };
  const typeName = typeMap[req.type] || req.type;
  let detail = '';
  if (req.type==='leave') detail = `${req.leaveType} / ${req.startDate}${req.endDate&&req.endDate!==req.startDate?' ~ '+req.endDate:''} / ${req.hours}h`;
  else if (req.type==='ot') detail = `${req.otType} / ${req.date} / ${req.hours}h`;
  else if (req.type==='comp') detail = `${req.startDate} / ${req.hours}h`;
  else if (req.type==='trip') detail = `${req.startDate} ~ ${req.endDate} / ${req.dest}`;

  // 신청인 (req.empId) vs 대리인 (currentEmp)
  const applicant = eid(req.empId); // 실제 신청 대상 직원
  const agent = currentEmp;         // 현재 로그인한 사람 (대리 신청자)
  const isSame = applicant && agent && String(applicant.id) === String(agent.id);

  const whoLine = isSame
    ? `<strong>${applicant?.name||'직원'}</strong> (${applicant?.dept||''}) 님이`
    : `<strong>${applicant?.name||'직원'}</strong> (${applicant?.dept||''}) 님 / 대리신청: <strong>${agent?.name||''}</strong> 님이`;

  const whoText = isSame
    ? `${applicant?.name||'직원'} (${applicant?.dept||''}) 님이`
    : `${applicant?.name||'직원'} (${applicant?.dept||''}) 님 / 대리신청: ${agent?.name||''} 님이`;

  try {
    const siteUrl = 'https://achou2154.github.io/JMsemicon';
    const payload = {
      to: adminEmails,
      subject: `[근태관리] ${applicant?.name||'직원'} 님의 ${typeName} 신청${isSame?'':` (대리: ${agent?.name||''})`}`,
      text: `${whoText} ${typeName}을 신청하였습니다.\n\n내용: ${detail}\n사유: ${req.reason||'없음'}\n신청일: ${req.reqDate}`,
      html: `
        <div style="font-family:sans-serif;max-width:480px;margin:0 auto;padding:24px">
          <div style="background:#1e40af;padding:16px 20px;border-radius:8px 8px 0 0">
            <span style="color:#fff;font-size:16px;font-weight:700">JM근태관리 신청 알림</span>
          </div>
          <div style="border:1px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;padding:20px">
            <p style="font-size:15px;margin:0 0 12px">${whoLine} <strong>${typeName}</strong>을 신청하였습니다.</p>
            <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:20px">
              <tr style="background:#f8fafc"><td style="padding:8px 12px;color:#64748b;width:80px">내용</td><td style="padding:8px 12px">${detail}</td></tr>
              <tr><td style="padding:8px 12px;color:#64748b">사유</td><td style="padding:8px 12px">${req.reason||'없음'}</td></tr>
              <tr style="background:#f8fafc"><td style="padding:8px 12px;color:#64748b">신청일</td><td style="padding:8px 12px">${req.reqDate}</td></tr>
            </table>
            <div style="text-align:center">
              <a href="${siteUrl}" style="display:inline-block;background:#1e40af;color:#fff;text-decoration:none;padding:12px 32px;border-radius:6px;font-size:14px;font-weight:600">
                📋 근태관리 바로가기
              </a>
            </div>
            <p style="font-size:11px;color:#94a3b8;text-align:center;margin-top:16px">JM Semiconductor HR Attendance System</p>
          </div>
        </div>
      `
    };
    const { data: { session } } = await _supa.auth.getSession();
    await fetch(`${SUPA_URL}/functions/v1/notify-admin`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session?.access_token || SUPA_KEY}`
      },
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn('이메일 알림 실패:', e); }
}

function exportExcel() {
  // SheetJS(XLSX) 라이브러리로 Excel 생성
  if (typeof XLSX === 'undefined') {
    showToast('⚠️ Excel 라이브러리 로딩 중... 잠시 후 다시 시도해주세요');
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = () => exportExcel();
    document.head.appendChild(s);
    return;
  }

  const wb = XLSX.utils.book_new();
  const typeMap = {leave:'연차',ot:'특근',comp:'대체휴무',trip:'출장',outside:'외근',education:'교육'};
  const statusMap = {pending:'승인대기',approved:'승인됨',rejected:'반려',completed:'수검완료',modify_requested:'수정신청'};

  // 1. 직원 명부
  const empRows = db.employees.map(e => ({
    'ID': e.id, '이름': e.name, '부서': e.dept, '직책': e.position,
    '연락처': e.phone, '이메일': e.email, '입사일': e.joinDate,
    '생년월일': e.birthdate, '음양력': e.birthdateLunar?'음력':'양력',
    '사외이사': e.isExternal?'⭐':''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(empRows), '직원 명부');

  // 2. 연차 배분
  const laRows = db.leaveAlloc.map(la => {
    const e = eid(la.empId);
    return { '직원': e?e.name:'?', '부서': e?e.dept:'', '년도': la.year,
      '부여연차(h)': la.total||0, '이월(h)': la.carryover||0,
      '부여(일)': Math.round((la.total||0)/8*10)/10,
      '이월(일)': Math.round((la.carryover||0)/8*10)/10 };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(laRows), '연차 배분');

  // 3. 신청 내역
  const reqRows = db.requests.map(r => {
    const e = eid(r.empId);
    return { '직원': e?e.name:'?', '부서': e?e.dept:'', '년도': r.year,
      '유형': typeMap[r.type]||r.type,
      '구분': r.leaveType||r.otType||r.tripKind||'',
      '시작일': r.startDate||r.date||'', '종료일': r.endDate||'',
      '시간(h)': r.hours||'', '사유': r.reason||'',
      '상태': statusMap[r.status]||r.status, '신청일': r.reqDate||'' };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(reqRows), '신청 내역');

  // 4. 기념일·생일
  const evRows = db.events.map(ev => {
    const e = eid(ev.empId);
    return { '직원': e?e.name:'?', '유형': ev.type==='birthday'?'생일':'기념일',
      '이름': ev.name, '월': ev.month, '일': ev.day,
      '음양력': ev.calType==='lunar'?'음력':'양력' };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(evRows), '기념일·생일');

  // 5. 건강검진
  const healthRows = db.health.map(h => {
    const e = eid(h.empId);
    const fam = (h.members||[]).filter(m=>m.relation!=='본인');
    return { '직원': e?e.name:'?', '부서': e?e.dept:'', '년도': h.year,
      '예약일': h.reserveDate||'', '수검일': h.checkupDate||'',
      '상태': statusMap[h.status]||h.status,
      '승인': h.approved?'승인':'미승인',
      '가족수': fam.length,
      '가족정보': fam.map(m=>`${m.relation}(${m.name||''}/${m.birthdate||''})`).join(', ') };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(healthRows), '건강검진');

  // 6. 공지사항
  const noticeRows = (db.notices||[]).map(n => ({
    '제목': n.title, '내용': n.content, '기간(일)': n.duration,
    '시작일': n.startDate, '종료일': n.endDate, '대상자수': (n.targetIds||[]).length
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(noticeRows), '공지사항');

  XLSX.writeFile(wb, `JM근태_${todayStr()}.xlsx`);
  showToast('📊 Excel 다운로드 시작');
}

function resetAll() {
  if (!confirm('⚠️ 모든 로컬 캐시를 초기화하시겠습니까?')) return;
  localStorage.removeItem(LS_CACHE);
  location.reload();
}

function saveCache() {
  try { localStorage.setItem(LS_CACHE, JSON.stringify(db)); } catch {}
}
function loadFromCache() {
  try {
    const raw = localStorage.getItem(LS_CACHE);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.employees) db = d;
    recalcNextIds();
  } catch {}
}

function recalcNextIds() {
  const allIds = [...(db.requests||[]).map(r=>+r.id||0), ...(db.employees||[]).map(r=>+r.id||0)];
  nextId = allIds.length ? Math.max(...allIds)+1 : 100;
  const eIds = (db.events||[]).map(r=>+r.id||0);
  nextEventId = eIds.length ? Math.max(...eIds)+1 : 100;
  const hIds = (db.health||[]).map(r=>+r.id||0);
  nextHealthId = hIds.length ? Math.max(...hIds)+1 : 100;
}

async function doLogin() {
  const email = document.getElementById('login-email')?.value?.trim();
  const pw    = document.getElementById('login-pw')?.value;
  const errEl = document.getElementById('login-err');
  const btn   = document.getElementById('login-btn');
  if (!email || !pw) { if(errEl) errEl.textContent='이메일과 비밀번호를 입력하세요'; return; }
  if (btn) { btn.textContent='로그인 중...'; btn.disabled=true; }
  const { error } = await _supa.auth.signInWithPassword({ email, password:pw });
  if (error) {
    if (errEl) errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다';
    if (btn) { btn.textContent='로그인'; btn.disabled=false; }
  } else {
    // 아이디/비번 저장 처리
    const saveEmail = document.getElementById('save-email')?.checked;
    const savePw    = document.getElementById('save-pw')?.checked;
    if (saveEmail) localStorage.setItem('saved_email', email);
    else localStorage.removeItem('saved_email');
    if (savePw) localStorage.setItem('saved_pw', pw);
    else localStorage.removeItem('saved_pw');
  }
}

async function onSignedIn(user) {
  try {
    // 로그인 화면 숨기고 앱 표시 (먼저)
    const loginDiv = document.getElementById('login-screen');
    if (loginDiv) loginDiv.style.display = 'none';
    document.querySelector('.app').style.display = 'flex';
    currentUser = user;

    // 직원 정보 로드
    try {
      const { data: empData } = await _supa
        .from('employees').select('*').eq('user_id', user.id).single();
      currentEmp = empData ? normalizeEmp(empData) : null;
    } catch(e) { console.warn('직원정보 로드 실패:', e); }

    // 관리자 여부 확인
    try {
      const { data: adminData } = await _supa
        .from('admins').select('id').eq('user_id', user.id).single();
      isAdmin = !!adminData;
    } catch(e) { isAdmin = false; }

    updateAdminUI();

    // 접기/펴기 버튼 표시
    const sbBtn = document.getElementById('sb-toggle-fixed-btn');
    if (sbBtn) sbBtn.style.display = '';

    // 데이터 로드
    await loadAllData();
    await loadAdminEmails();
    go('calendar');
    setTimeout(checkAndShowAlerts, 800);
  } catch(e) {
    console.error('onSignedIn 오류:', e);
    // 오류나도 앱은 표시
    go('calendar');
  }
}

function onSignedOut() {
  currentUser = null; currentEmp = null; isAdmin = false;
  // 접기/펴기 버튼 숨김
  const sbBtn = document.getElementById('sb-toggle-fixed-btn');
  if (sbBtn) sbBtn.style.display = 'none';
  document.querySelector('.app').style.display = 'none';
  showLoginScreen();
}

// 본인 데이터인지 확인
function isMine(empId) {
  if (isAdmin) return true;
  return currentEmp && String(currentEmp.id) === String(empId);
}
// 직원: 자신의 empId로만 신청 가능
function myEmpId() {
  return currentEmp ? currentEmp.id : null;
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function eid(id) { return db.employees.find(e=>String(e.id)===String(id)); }
function ename(id) { const e=eid(id); return e?e.name:'?'; }
function edept(id) { const e=eid(id); return e?e.dept:'?'; }
function av(empId, sz=28) {
  const e=eid(empId); if(!e) return '';
  if (e.avatarUrl) {
    return `<img src="${e.avatarUrl}" style="width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`;
  }
  const idx=(+empId-1)%AVATARSETS.length;
  const[bg,fg]=AVATARSETS[idx];
  return `<span class="avatar" style="width:${sz}px;height:${sz}px;background:${bg};color:${fg};font-size:${Math.round(sz*.4)}px">${e.name[0]}</span>`;
}
function avColor(empId){return AVATARSETS[(+empId-1)%AVATARSETS.length];}
function badge(t,c){return `<span class="badge badge-${c}">${t}</span>`;}
function statusBadge(s){
  if(s==='approved')return badge('승인','ok');
  if(s==='pending') return badge('대기','warn');
  if(s==='rejected')return badge('반려','danger');
  return badge(s,'neutral');
}
// 날짜 포맷: 2026-03-15 → 26.03.15 (연도 뒤 2자리)
function fmt(d){
  if(!d) return '';
  const s=String(d);
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[1].slice(2)+'.'+m[2]+'.'+m[3];
  return s.replace(/-/g,'.');
}

// ── 커스텀 날짜 입력 ──────────────────────────────────────
// 연도 4자리 입력 후 자동으로 월 → 일 이동
// 사용: makeDateInput('f-start', '2026-03-15')
// 값 읽기: getDateVal('f-start') → '2026-03-15'

function makeDateInput(id, defaultVal=''){
  const today=todayStr();
  const y=defaultVal?defaultVal.slice(0,4):today.slice(0,4);
  const mo=defaultVal?defaultVal.slice(5,7):'';
  const d=defaultVal?defaultVal.slice(8,10):'';
  return `<div class="date-input-wrap" id="wrap-${id}">
    <input class="date-seg" id="${id}-y" maxlength="4" placeholder="YYYY"
      style="width:70px" value="${y}"
      oninput="moveDateFocus(this,'${id}-m',4)"
      onkeydown="dateSegKey(event,this,null,'${id}-m')">
    <span class="date-sep">-</span>
    <input class="date-seg" id="${id}-m" maxlength="2" placeholder="MM"
      style="width:44px" value="${mo}"
      oninput="moveDateFocus(this,'${id}-d',2)"
      onkeydown="dateSegKey(event,this,'${id}-y','${id}-d')">
    <span class="date-sep">-</span>
    <input class="date-seg" id="${id}-d" maxlength="2" placeholder="DD"
      style="width:44px" value="${d}"
      onkeydown="dateSegKey(event,this,'${id}-m',null)">
  </div>`;
}

function moveDateFocus(el, nextId, maxLen){
  // 숫자만 허용
  el.value = el.value.replace(/[^0-9]/g,'');
  if(el.value.length >= maxLen && nextId){
    const next = document.getElementById(nextId);
    if(next){ next.focus(); next.select(); }
  }
}

function dateSegKey(e, el, prevId, nextId){
  // Backspace on empty → 이전 필드로
  if(e.key==='Backspace' && el.value==='' && prevId){
    const prev=document.getElementById(prevId);
    if(prev){ prev.focus(); prev.setSelectionRange(prev.value.length,prev.value.length); }
  }
  // Tab/Enter → 다음
  if((e.key==='Tab'||e.key==='Enter') && nextId) {
    e.preventDefault();
    const next=document.getElementById(nextId);
    if(next){ next.focus(); next.select(); }
  }
}

function getDateVal(id){
  const y=(document.getElementById(id+'-y')||{}).value||'';

// ── 근로기준법 연차 자동 계산 ──
function calcLegalLeave(joinDate) {
  // 입사일로부터 법정 연차 계산 (최대 25일)
  if (!joinDate) return 15;
  const join = parseLocalDate(joinDate);
  const today = parseLocalDate(todayStr());
  const yearsWorked = (today - join) / (365.25 * 24 * 60 * 60 * 1000);
  if (yearsWorked < 1) return 11; // 1년 미만: 매월 1일씩 (최대 11)
  const fullYears = Math.floor(yearsWorked);
  // 만 1년: 15일, 만 3년부터 2년마다 1일씩 추가, 최대 25일
  let days = 15;
  if (fullYears >= 3) days += Math.floor((fullYears - 1) / 2);
  return Math.min(days, 25);
}

// 연차 사용률 계산 기준: 당해 3/1 ~ 다음해 2/28(29)
function getLeavePeriod(year) {
  const start = `${year}-03-01`;
  const endYear = year + 1;
  // 윤년 확인
  const isLeap = (endYear % 4 === 0 && endYear % 100 !== 0) || endYear % 400 === 0;
  const end = `${endYear}-02-${isLeap ? '29' : '28'}`;
  return { start, end };
}

function getLeavePctInPeriod(empId, year) {
  // 3/1~2/28 기간 내 사용한 연차만 계산
  const { start, end } = getLeavePeriod(year);
  const used = db.requests.filter(r =>
    r.type === 'leave' && String(r.empId) === String(empId) &&
    r.status === 'approved' &&
    r.startDate >= start && r.startDate <= end
  ).reduce((s, r) => s + (+r.hours || 0), 0);
  const a = getAlloc(empId, year);
  const total = (+a.total || 0) + (+a.carryover || 0);
  return total > 0 ? Math.round(used / total * 100) : 0;
}

// 관리자용 연차 잔여 경고 기준 (월별)
function getLeaveAlertThreshold() {
  const month = new Date().getMonth() + 1; // 1~12
  const thresholds = { 5:80, 6:70, 7:60, 8:50, 9:40, 10:30, 11:20, 12:10 };
  return thresholds[month] || null; // null이면 경고 없음
}

function isLeaveAlert(pct) {
  if (!isAdmin) return false;
  const threshold = getLeaveAlertThreshold();
  if (threshold === null) return false;
  return pct >= threshold;
}

// leaveAlloc helpers
function getAlloc(empId, year) {
  const a = db.leaveAlloc.find(r=>String(r.empId)===String(empId)&&String(r.year)===String(year));
  if (!a) {
    const newA = { empId, year, total: 120, carryover: 0 };
    db.leaveAlloc.push(newA);
    return newA;
  }
  return a;
}
function getLeaveUsed(empId, year) {
  return db.requests.filter(r=>r.type==='leave'&&String(r.empId)===String(empId)&&String(r.year)===String(year)&&r.status==='approved'&&r.leaveType!=='병가'&&r.leaveType!=='특별휴가').reduce((s,r)=>s+(+r.hours||0),0);
}
function getLeaveRemain(empId, year) {
  const a=getAlloc(empId,year);
  return (+a.total||0)+(+a.carryover||0)-(+a.extinct||0)-getLeaveUsed(empId,year);
}
function calcComp(hours,otType){return Math.round((+hours)*(OT_RATE[otType]||1.5)*10)/10;}
function getCompEarned(empId,year){
  return db.requests.filter(r=>r.type==='ot'&&String(r.empId)===String(empId)&&String(r.year)===String(year)&&r.status==='approved'&&!r.useTransport).reduce((s,r)=>s+calcComp(r.hours,r.otType),0);
}
function getCompUsed(empId,year){
  return db.requests.filter(r=>r.type==='comp'&&String(r.empId)===String(empId)&&String(r.year)===String(year)&&r.status==='approved').reduce((s,r)=>s+(+r.hours||0),0);
}
function getCompCarryover(empId,year){
  const py=year-1;
  return Math.max(0,getCompEarned(empId,py)-getCompUsed(empId,py));
}
function getCompRemain(empId,year){return getCompCarryover(empId,year)+getCompEarned(empId,year)-getCompUsed(empId,year);}
// 대체휴무 만료 계산: 발생일로부터 1년 이내 사용 (건별)
function getCompExpired(empId, year) {
  // 해당 연도 특근 중 발생일+1년이 오늘 이전인 것 → 만료
  const today = todayStr();
  return db.requests
    .filter(r=>r.type==='ot'&&String(r.empId)===String(empId)&&String(r.year)===String(year)&&r.status==='approved'&&!r.useTransport)
    .filter(r=>{
      if(!r.date) return false;
      const exp = new Date(r.date); exp.setFullYear(exp.getFullYear()+1);
      return toLocalDateStr(exp) < today;
    })
    .reduce((s,r)=>s+calcComp(r.hours,r.otType),0);
}
function getCompValidRemain(empId, year) {
  // 유효한 잔여 대휴: 전체 잔여 - 만료된 것
  const rem = getCompRemain(empId, year);
  const expired = getCompExpired(empId, year);
  return Math.max(0, rem - expired);
}
// 만료 임박(30일 이내) 대휴 시간
function getCompExpiringSoon(empId, year) {
  const today = parseLocalDate(todayStr());
  const soon = new Date(today); soon.setDate(soon.getDate()+30);
  const soonStr = toLocalDateStr(soon);
  return db.requests
    .filter(r=>r.type==='ot'&&String(r.empId)===String(empId)&&String(r.year)===String(year)&&r.status==='approved'&&!r.useTransport)
    .filter(r=>{
      if(!r.date) return false;
      const exp = new Date(r.date); exp.setFullYear(exp.getFullYear()+1);
      const expStr = toLocalDateStr(exp);
      return expStr >= todayStr() && expStr <= soonStr;
    })
    .reduce((s,r)=>s+calcComp(r.hours,r.otType),0);
}

// 타임존 안전 날짜 유틸 (UTC 오프셋 문제 방지)
function parseLocalDate(str){
  if(!str) return null;
  const [y,m,d]=str.split('-').map(Number);
  return new Date(y,m-1,d); // 로컬 타임존 기준
}
function toLocalDateStr(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const d=String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function todayStr(){
  return toLocalDateStr(new Date());
}
function lunarToSolar(year, lm, ld){
  const data = LUNAR_DATA[year];
  if(!data) return null;
  let offset = 0;
  for(let m = 1; m < lm; m++) offset += data.months[m-1] || 30;
  offset += ld - 1;
  const base = parseLocalDate(data.start);
  base.setDate(base.getDate() + offset);
  return toLocalDateStr(base);
}
function getEventDate(ev,year){
  if(ev.calType==='lunar') return lunarToSolar(year,+ev.month,+ev.day)||`${year}-${String(ev.month).padStart(2,'0')}-${String(ev.day).padStart(2,'0')}`;
  return `${year}-${String(ev.month).padStart(2,'0')}-${String(ev.day).padStart(2,'0')}`;
}
function iterDates(s,e,fn){
  let d=parseLocalDate(s);
  const end=parseLocalDate(e);
  while(d<=end){ fn(toLocalDateStr(d)); d.setDate(d.getDate()+1); }
}

// ─ 1. 전체 현황 ────────────────────────────
function renderOverview(){
  if(!isAdmin){ go('calendar'); return; }
  const yr=currentYear;
  const pending=db.requests.filter(r=>String(r.year)===String(yr)&&r.status==='pending').length;
  const totalLU=db.employees.reduce((s,e)=>s+getLeaveUsed(e.id,yr),0);
  const totalExtinct=db.leaveAlloc.filter(a=>String(a.year)===String(yr)).reduce((s,a)=>s+(+a.extinct||0),0);
  // 전체 잔여연차 합계 (발생-소멸-사용)
  const totalLeaveAlloc=db.employees.filter(e=>!e.isExternal).reduce((s,e)=>s+getLeaveRemain(e.id,yr),0);
  const totalOT=db.requests.filter(r=>r.type==='ot'&&String(r.year)===String(yr)&&r.status==='approved').reduce((s,r)=>s+(+r.hours||0),0);
  const totalComp=db.requests.filter(r=>r.type==='comp'&&String(r.year)===String(yr)&&r.status==='approved').reduce((s,r)=>s+(+r.hours||0),0);
  const totalCompUsed=db.employees.reduce((s,e)=>s+getCompUsed(e.id,yr),0);
  const totalCompRemain=db.employees.reduce((s,e)=>s+getCompRemain(e.id,yr),0);
  const totalTrips=db.requests.filter(r=>r.type==='trip'&&String(r.year)===String(yr)&&r.status==='approved').length;
  const totalTrans=db.employees.reduce((s,e)=>s+getTransTotal(e.id,yr),0);
  const todayD=parseLocalDate(todayStr());


  const rows=getSortedByPosition().filter(e=>!isHiddenFromPersonal(e)).map(e=>{
    const a=getAlloc(e.id,yr);
    const lTotal=(+a.total||0)+(+a.carryover||0);
    const lUsed=getLeaveUsed(e.id,yr);
    const lRem=getLeaveRemain(e.id,yr);
    const pct=getLeavePctInPeriod(e.id,yr); // 3/1 기준 사용률
    const cRem=getCompRemain(e.id,yr);
    const trips=db.requests.filter(r=>r.type==='trip'&&String(r.empId)===String(e.id)&&String(r.year)===String(yr)&&r.status==='approved').length;
    const trans=getTransTotal(e.id,yr);
    const lRemDays=Math.round(lRem/8*10)/10;
    const _alloc2 = getAlloc(e.id,yr);
    const lTotal2=(+_alloc2.total||0)+(+_alloc2.carryover||0);
    const remPct=lTotal2>0?Math.round(lRem/lTotal2*100):0;
    // 잔여율 기준으로 경고 (잔여가 많이 남아있으면 경고, 연차가 있는 직원만)
    const lRemAlert=isAdmin && lTotal2>0 && (() => {
      const threshold = getLeaveAlertThreshold();
      if (threshold === null) return false;
      return remPct >= threshold;
    })();
    const cRemAlert=cRem>=40;
    const NA=`<span style="font-size:12px;color:#bbb">임원</span>`;
    const extBadge=e.isExternal?`<span class="badge" style="background:#f1f0ec;color:#888;border:1px solid #ddd;font-size:10px;margin-left:5px">⭐</span>`:'';
    return`<tr ${e.isExternal?'style="background:#fafafa"':''}>
      <td><div class="name-cell">${av(e.id)}<span style="color:var(--accent);cursor:pointer;text-decoration:underline" onclick="openEmpProfile(${e.id})">${e.name}</span>${extBadge}</div></td>
      <td>${e.dept}</td>
      <td>${e.isExternal?NA:badge(Math.round(lUsed/8*10)/10+'일','leave')}</td>
      <td>${e.isExternal?NA:`<div style="display:flex;align-items:center;gap:6px">
        <span style="${lRemAlert?'color:var(--danger);font-weight:700':''}">${lRemDays}일${lRemAlert?' ⚠️':''}</span>
        <span style="font-size:11px;${lRemAlert?'color:var(--danger);font-weight:700':'color:var(--text3)'}">${pct}%${lRemAlert?' ⚠️':''}</span>
        <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%;background:${lRemAlert?'var(--danger)':'var(--leave)'}"></div></div>
      </div>`}</td>
      <td>${e.isExternal?NA:cRem>0?`<span class="badge badge-comp" style="${cRemAlert?'background:var(--danger-bg);color:var(--danger)':''}">${cRem}h${cRemAlert?' ⚠️':''}</span>`:'—'}</td>
      <td>${trips>0?badge(trips+'회','trip'):'—'}</td>
      <td>${trans>0?'₩'+trans.toLocaleString():'—'}</td>
    </tr>`;
  }).join('');


  // 월별 연차 사용 그래프 데이터
  const months12 = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const monthlyUsage = months12.map((_,mi) => {
    const m = mi+1;
    const mStr = String(yr)+'-'+String(m).padStart(2,'0');
    return db.requests.filter(r=>
      r.type==='leave' && r.status!=='rejected' &&
      ((r.startDate||'').startsWith(mStr)||(r.endDate||'').startsWith(mStr))
    ).reduce((s,r)=>s+(+r.hours||0),0);
  });
  const maxUsage = Math.max(...monthlyUsage, 1);
  const monthBars = months12.map((m,i)=>{
    const h = monthlyUsage[i];
    const pct = Math.round(h/maxUsage*100);
    const days = Math.round(h/8*10)/10;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      <div style="font-size:10px;color:var(--text2);font-weight:500">${days>0?days+'일':''}</div>
      <div style="width:100%;background:var(--border);border-radius:4px 4px 0 0;height:60px;display:flex;align-items:flex-end">
        <div style="width:100%;background:var(--leave);border-radius:4px 4px 0 0;height:${pct}%;min-height:${h>0?2:0}px;transition:height .3s"></div>
      </div>
      <div style="font-size:10px;color:var(--text3)">${m}</div>
    </div>`;
  }).join('');

  setContent(`
    ${pending?`<div style="background:var(--warn-bg);border:1px solid #fcd34d;border-radius:var(--radius);padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--ot);display:flex;align-items:center;gap:8px">⚠️ 승인 대기 <strong>${pending}건</strong> <button class="btn btn-sm btn-warn" onclick="go('requests')">확인</button></div>`:''}
    <div class="stats-row" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat-card leave" style="cursor:pointer" onclick="openOverviewDetail('leave')">
        <div class="stat-label">잔여연차</div>
        <div class="stat-val">${Math.round(totalLeaveAlloc/8*10)/10}일</div>
        <div class="stat-sub">발생 ${Math.round(totalLU/8*10+totalLeaveAlloc/8*10)/10}일 / 잔여 ${Math.round(totalLeaveAlloc/8*10)/10}일</div>
      </div>
      <div class="stat-card ot" style="cursor:pointer" onclick="openOverviewDetail('ot')">
        <div class="stat-label">발생특근</div>
        <div class="stat-val">${totalOT}h</div>
        <div class="stat-sub">${Math.round(totalOT/8*10)/10}일</div>
      </div>
      <div class="stat-card comp" style="cursor:pointer" onclick="openOverviewDetail('comp')">
        <div class="stat-label">잔여대휴</div>
        <div class="stat-val">${totalCompRemain}h</div>
        <div class="stat-sub">발생 ${totalComp}h / 사용 ${totalCompUsed}h</div>
      </div>
      <div class="stat-card trip" style="cursor:pointer" onclick="openOverviewDetail('trip')">
        <div class="stat-label">출장</div>
        <div class="stat-val">${totalTrips}건</div>
        <div class="stat-sub">해외+국내+교육</div>
      </div>
      <div class="stat-card" style="cursor:pointer" onclick="openOverviewDetail('trans')">
        <div class="stat-label">교통비</div>
        <div class="stat-val">₩${Math.round(totalTrans/10000)}만</div>
        <div class="stat-sub">${totalTrans.toLocaleString()}원</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="card-title">📊 ${yr}년 월별 연차 사용 현황</div>
      <div style="display:flex;gap:4px;align-items:flex-end;padding:8px 0">${monthBars}</div>
    </div>
    ${(()=>{const _at=getLeaveAlertThreshold();return _at?`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--radius);padding:8px 14px;margin-bottom:12px;font-size:12px;color:var(--danger)">⚠️ 이번 달 기준: 잔여 연차 ${_at}% 이상인 직원이 빨간색으로 표시됩니다.</div>`:''})()}
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title" style="margin:0">${yr}년 전직원 현황</div>
        <input id="overview-search" placeholder="🔍 직원 검색..." oninput="filterOverviewTable(this.value)"
          style="padding:6px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;width:180px">
      </div>
      <div class="table-wrap"><table id="overview-table">
        <thead><tr><th>직원</th><th>부서</th><th>연차 사용</th><th>잔여 연차</th><th>대체휴무 잔여</th><th>출장</th><th>교통비</th></tr></thead>
        <tbody>${rows||emptyRow(7)}</tbody>
      </table></div>
    </div>
  `);
}

// 검색창이 있는 페이지 목록
const SEARCH_PAGES = ['roster','requests','leave','ot','trip','transport','bday','health'];

function showTopbarSearch(show) {
  const el = document.getElementById('topbar-emp-search');
  if (!el) return;
  if (show && isAdmin) {
    el.style.display = '';
    el.value = '';
  } else {
    el.style.display = 'none';
    el.value = '';
  }
}

function topbarEmpSearch(q) {
  // 현재 페이지의 메인 테이블에서 검색
  const tables = document.querySelectorAll('.table-wrap table tbody');
  tables.forEach(tbody => {
    tbody.querySelectorAll('tr').forEach(tr => {
      tr.style.display = q ? (tr.textContent.includes(q) ? '' : 'none') : '';
    });
  });
}

function openDayDetail(ds) {
  const evList = (window._calEv && window._calEv[ds]) || [];
  if (!evList.length) return;

  const date = fmt(ds);
  const groups = {
    leave: { label: '🏖️ 연차', items: [], cls: 'var(--leave)' },
    comp:  { label: '🔄 대체휴무', items: [], cls: 'var(--comp)' },
    trip:  { label: '✈️ 출장/외근', items: [], cls: 'var(--trip)' },
    ot:    { label: '⚡ 특근', items: [], cls: 'var(--ot)' },
    bday:  { label: '🎂 생일/기념일', items: [], cls: 'var(--bday)' },
    health:{ label: '🏥 건강검진', items: [], cls: 'var(--health)' },
    other: { label: '📌 기타', items: [], cls: 'var(--text2)' },
  };

  evList.forEach(e => {
    const key = e.cls === 'ev-leave' ? 'leave'
      : e.cls === 'ev-comp' ? 'comp'
      : e.cls === 'ev-trip' ? 'trip'
      : e.cls === 'ev-ot' ? 'ot'
      : e.cls === 'ev-bday' ? 'bday'
      : e.cls === 'ev-health' ? 'health' : 'other';
    groups[key].items.push(e.label);
  });

  const groupHtml = Object.values(groups)
    .filter(g => g.items.length > 0)
    .map(g => `
      <div style="margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:${g.cls};margin-bottom:6px">${g.label}</div>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${g.items.map(item => `<div style="font-size:13px;padding:4px 10px;background:var(--bg);border-radius:6px">${item}</div>`).join('')}
        </div>
      </div>`).join('');

  openModal(`
    <div class="modal-title">📅 ${date} 일정</div>
    <div style="max-height:400px;overflow-y:auto">${groupHtml}</div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="closeModal()">닫기</button>
    </div>
  `);
}

function filterTable(tableId, q) {
  const tbody = document.querySelector('#'+tableId+' tbody');
  if (!tbody) return;
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.style.display = q ? (tr.textContent.includes(q) ? '' : 'none') : '';
  });
}

function openOverviewDetail(type) {
  const yr = currentYear;
  const emps = getSortedByPosition().filter(e=>!isHiddenFromPersonal(e));

  if (type === 'leave') {
    // 연차사용 내림차순 + 연차소멸 내역
    const leaveRows = emps.map(e=>{
      const used = getLeaveUsed(e.id,yr);
      return {e, used};
    }).filter(x=>x.used>0).sort((a,b)=>(a.e.name||"").localeCompare(b.e.name||"","ko"))
      .map(({e,used})=>`<tr>
        <td><div class="name-cell">${av(e.id)}<span>${e.name}</span></div></td>
        <td>${e.dept}</td>
        <td>${Math.round(used/8*10)/10}일</td>
        <td>${used}h</td>
      </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text3)">내역 없음</td></tr>';

    const extinctRows = emps.map(e=>{
      const a = getAlloc(e.id,yr);
      return {e, ext: +a.extinct||0};
    }).filter(x=>x.ext>0).sort((a,b)=>b.ext-a.ext)
      .map(({e,ext})=>`<tr>
        <td><div class="name-cell">${av(e.id)}<span>${e.name}</span></div></td>
        <td>${e.dept}</td>
        <td style="color:var(--danger);font-weight:600">${Math.round(ext/8*10)/10}일</td>
        <td style="color:var(--danger)">${ext}h</td>
        <td style="color:var(--text3);font-size:11px">${yr}-03-01</td>
      </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text3)">소멸 내역 없음</td></tr>';

    openModal(`
      <div class="modal-title">📋 ${yr}년 연차 사용 / 소멸 내역</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-height:500px">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--leave);margin-bottom:8px">연차 사용 (내림차순)</div>
          <div style="overflow-y:auto;max-height:440px">
            <table><thead><tr><th>직원</th><th>부서</th><th>사용(일)</th><th>사용(h)</th></tr></thead>
            <tbody>${leaveRows}</tbody></table>
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px">※ 근로기준법 제61조(연차유급휴가의 사용 촉진)에 따라 소멸된 연차 내역</div>
          <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:8px">연차 소멸</div>
          <div style="overflow-y:auto;max-height:400px">
            <table><thead><tr><th>직원</th><th>부서</th><th>소멸(일)</th><th>소멸(h)</th><th>기준일</th></tr></thead>
            <tbody>${extinctRows}</tbody></table>
          </div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">닫기</button></div>
    `, true);

  } else if (type === 'ot') {
    const rows = emps.map(e=>{
      const ots = db.requests.filter(r=>r.type==='ot'&&String(r.empId)===String(e.id)&&String(r.year)===String(yr)&&r.status==='approved');
      const total = ots.reduce((s,r)=>s+(+r.hours||0),0);
      return {e, total, ots};
    }).filter(x=>x.total>0).sort((a,b)=>(a.e.name||"").localeCompare(b.e.name||"","ko"))
      .map(({e,total,ots})=>`<tr>
        <td><div class="name-cell">${av(e.id)}<span>${e.name}</span></div></td>
        <td>${e.dept}</td>
        <td>${total}h</td>
        <td style="font-size:11px;color:var(--text3)">${ots.map(r=>r.otType||'특근').join(', ')}</td>
      </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text3)">내역 없음</td></tr>';

    openModal(`
      <div class="modal-title">⚡ ${yr}년 발생특근 내역</div>
      <div style="max-height:500px;overflow-y:auto">
        <table><thead><tr><th>직원</th><th>부서</th><th>특근(h)</th><th>구분</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">닫기</button></div>
    `, true);

  } else if (type === 'comp') {
    const compData = emps.map(e=>{
      const earned = getCompEarned(e.id,yr);
      const used = getCompUsed(e.id,yr);
      const rem = getCompRemain(e.id,yr);
      return {e, earned, used, rem};
    }).filter(x=>x.earned>0||x.used>0);

    const earnedRows = [...compData].sort((a,b)=>(a.e.name||"").localeCompare(b.e.name||"","ko"))
      .map(({e,earned})=>`<tr><td><div class="name-cell">${av(e.id)}<span>${e.name}</span></div></td><td>${earned}h</td></tr>`).join('');
    const usedRows = [...compData].sort((a,b)=>(a.e.name||"").localeCompare(b.e.name||"","ko"))
      .map(({e,used})=>`<tr><td><div class="name-cell">${av(e.id)}<span>${e.name}</span></div></td><td>${used}h</td></tr>`).join('');
    const remRows = [...compData].sort((a,b)=>(a.e.name||"").localeCompare(b.e.name||"","ko"))
      .map(({e,rem})=>`<tr><td><div class="name-cell">${av(e.id)}<span>${e.name}</span></div></td><td style="${rem>0?'color:var(--comp);font-weight:600':'color:var(--text3)'}">${rem}h</td></tr>`).join('');

    openModal(`
      <div class="modal-title">🔄 ${yr}년 대체휴무 내역</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-height:500px">
        <div><div style="font-size:12px;font-weight:700;color:var(--comp);margin-bottom:6px">발생 대휴</div>
          <div style="overflow-y:auto;max-height:440px"><table><thead><tr><th>직원</th><th>발생(h)</th></tr></thead><tbody>${earnedRows||'<tr><td colspan="2" style="text-align:center;color:var(--text3)">없음</td></tr>'}</tbody></table></div></div>
        <div><div style="font-size:12px;font-weight:700;color:var(--leave);margin-bottom:6px">사용 대휴</div>
          <div style="overflow-y:auto;max-height:440px"><table><thead><tr><th>직원</th><th>사용(h)</th></tr></thead><tbody>${usedRows||'<tr><td colspan="2" style="text-align:center;color:var(--text3)">없음</td></tr>'}</tbody></table></div></div>
        <div><div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px">잔여 대휴</div>
          <div style="overflow-y:auto;max-height:440px"><table><thead><tr><th>직원</th><th>잔여(h)</th></tr></thead><tbody>${remRows||'<tr><td colspan="2" style="text-align:center;color:var(--text3)">없음</td></tr>'}</tbody></table></div></div>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">닫기</button></div>
    `, true);

  } else if (type === 'trip') {
    const mkTripRows = (kind) => emps.map(e=>{
      const trips = db.requests.filter(r=>r.type==='trip'&&String(r.empId)===String(e.id)&&String(r.year)===String(yr)&&r.status==='approved'&&(kind==='edu'?false:r.tripKind===kind));
      const edus = kind==='edu' ? db.requests.filter(r=>r.type==='education'&&String(r.empId)===String(e.id)&&String(r.year)===String(yr)&&r.status==='approved') : [];
      const list = kind==='edu' ? edus : trips;
      return {e, cnt: list.length, list};
    }).filter(x=>x.cnt>0).sort((a,b)=>(a.e.name||"").localeCompare(b.e.name||"","ko"))
      .map(({e,cnt})=>`<tr><td><div class="name-cell">${av(e.id)}<span>${e.name}</span></div></td><td>${cnt}건</td></tr>`).join('') || '<tr><td colspan="2" style="text-align:center;color:var(--text3)">없음</td></tr>';

    openModal(`
      <div class="modal-title">✈️ ${yr}년 출장/교육 내역</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-height:500px">
        <div><div style="font-size:12px;font-weight:700;margin-bottom:6px">🌏 해외출장</div>
          <div style="overflow-y:auto;max-height:440px"><table><thead><tr><th>직원</th><th>건수</th></tr></thead><tbody>${mkTripRows('overseas')}</tbody></table></div></div>
        <div><div style="font-size:12px;font-weight:700;margin-bottom:6px">🇰🇷 국내출장</div>
          <div style="overflow-y:auto;max-height:440px"><table><thead><tr><th>직원</th><th>건수</th></tr></thead><tbody>${mkTripRows('domestic')}</tbody></table></div></div>
        <div><div style="font-size:12px;font-weight:700;margin-bottom:6px">📚 교육</div>
          <div style="overflow-y:auto;max-height:440px"><table><thead><tr><th>직원</th><th>건수</th></tr></thead><tbody>${mkTripRows('edu')}</tbody></table></div></div>
      </div>

// ─ 2. 직원 명부 ────────────────────────────
function getSortedEmployees() {
  let list = [...db.employees];
  if (rosterSortKey === 'custom') {
    if (rosterOrder.length) {
      list.sort((a,b) => {
        const ai = rosterOrder.indexOf(String(a.id));
        const bi = rosterOrder.indexOf(String(b.id));
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
    }
  } else if (rosterSortKey === 'position') {
    list.sort((a,b) => {
      const ai = POS_ORDER.findIndex(p => (a.position||'').includes(p));
      const bi = POS_ORDER.findIndex(p => (b.position||'').includes(p));
      return (ai===-1?99:ai) - (bi===-1?99:bi);
    });
  } else if (rosterSortKey === 'name') {
    list.sort((a,b) => a.name.localeCompare(b.name, 'ko'));
  } else if (rosterSortKey === 'dept') {
    list.sort((a,b) => (a.dept||'').localeCompare(b.dept||'', 'ko'));
  } else if (rosterSortKey === 'joinDate') {
    list.sort((a,b) => (a.joinDate||'').localeCompare(b.joinDate||''));
  }
  return list;
}

// 직책순-이름순 고정 정렬 (개인기록 시트용)
function getSortedByPosition() {
  return [...db.employees].sort((a,b) => {
    const ai = POS_ORDER.findIndex(p => (a.position||'').includes(p));
    const bi = POS_ORDER.findIndex(p => (b.position||'').includes(p));
    const posDiff = (ai===-1?99:ai) - (bi===-1?99:bi);
    if (posDiff !== 0) return posDiff;
    return (a.name||'').localeCompare(b.name||'', 'ko');
  });
}

async function addAnnivEvent(empId) {
  const e = eid(empId); if (!e) return;
  const name  = document.getElementById('ei-anniv-name')?.value?.trim();
  const month = parseInt(document.getElementById('ei-anniv-month')?.value);
  const day   = parseInt(document.getElementById('ei-anniv-day')?.value);
  const lunar = document.getElementById('ei-anniv-lunar')?.checked;
  if (!name) { showToast('기념일 이름을 입력하세요'); return; }
  if (!month || !day) { showToast('날짜를 입력하세요'); return; }
  const row = { emp_id: empId, type: 'anniversary', name: `${e.name} ${name}`, month, day, cal_type: lunar ? 'lunar' : 'solar', note: '' };
  const saved = await sbInsert('events', row);
  if (saved) {
    const newEv = { id: saved.id, empId, type: 'anniversary', name: row.name, month, day, calType: row.cal_type, note: '' };
    db.events.push(newEv);
    // 목록 새로고침
    const anniversaries = db.events.filter(ev => String(ev.empId) === String(empId) && ev.type === 'anniversary');
    const listEl = document.getElementById(`anniv-list-${empId}`);
    if (listEl) listEl.innerHTML = anniversaries.map(ev => `
      <div data-anniv-id="${ev.id}" style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="flex:1;font-size:13px">${ev.name}</span>
        <span style="font-size:12px;color:var(--text3)">${ev.month}월 ${ev.day}일 (${ev.calType==='lunar'?'음력':'양력'})</span>
        <button class="btn btn-sm btn-danger" style="padding:2px 8px" onclick="deleteAnniv(${ev.id})">삭제</button>
      </div>`).join('');
    document.getElementById('ei-anniv-name').value = '';
    document.getElementById('ei-anniv-month').value = '';
    document.getElementById('ei-anniv-day').value = '';
    showToast('✅ 기념일 추가됨');
  } else { showToast('⚠️ 추가 실패'); }
}

async function deleteAnniv(evId) {
  if (!confirm('기념일을 삭제하시겠습니까?')) return;
  const ok = await sbDelete('events', evId);
  if (!ok) { showToast('⚠️ 삭제 실패 - 다시 시도해주세요'); return; }
  // 로컬 즉시 반영
  db.events = db.events.filter(ev => String(ev.id) !== String(evId));
  saveAll();
  showToast('🗑️ 기념일 삭제됨');
  const el = document.querySelector(`[data-anniv-id="${evId}"]`);
  if (el) el.remove();
  // 달력/알람 즉시 갱신
  updateBdayAlarmBar();
}

async function saveEmpInfo(empId) {
  const e = eid(empId); if (!e) return;
  const name  = document.getElementById('ei-name')?.value?.trim() || e.name;
  const dept  = document.getElementById('ei-dept')?.value?.trim() || '';
  const pos   = document.getElementById('ei-pos')?.value?.trim() || '';
  const phone = document.getElementById('ei-phone')?.value?.trim() || '';
  const email = document.getElementById('ei-email')?.value?.trim() || '';
  const joinDate = getDateVal('ei-join') || e.joinDate || '';
  const birthdate = getDateVal('ei-birth') || '';
  const calSel = document.querySelector('input[name="ei-cal"]:checked');
  const birthdateLunar = calSel ? calSel.value === 'lunar' : false;
  const annexSel = document.querySelector('input[name="ei-anniv"]:checked');
  const anniversaryType = annexSel ? annexSel.value : 'birthday';
  const isExternal = document.getElementById('ei-external')?.checked || false;

  await sbUpdate('employees', empId, {
    name, dept, position: pos, phone, email,
    join_date: joinDate || null,
    birthdate: birthdate || null,
    birthdate_lunar: birthdateLunar,
    anniversary_type: anniversaryType,
    is_external: isExternal
  });
  Object.assign(e, { name, dept, position: pos, phone, email, joinDate, birthdate, birthdateLunar, anniversaryType, isExternal });
  // 생일 이벤트 자동 동기화
  await syncBirthdayEvent(e); // 생일 없으면 기존 이벤트 삭제
  saveAll(); showToast('✅ 저장되었습니다'); closeModal(); renderRoster();
}
function updateAlloc(empId,field,val){
  const a=getAlloc(empId,currentYear);
  a[field]=(parseFloat(val)||0)*8;
  saveAll();showToast('💾 저장됨');
}
async function deleteEmp(id){
  if(!confirm('삭제?'))return;
  // 해당 직원 events 먼저 삭제 (고아 데이터 방지)
  const empEvents = db.events.filter(ev => String(ev.empId) === String(id));
  for (const ev of empEvents) { await sbDelete('events', ev.id); }
  db.events = db.events.filter(ev => String(ev.empId) !== String(id));
  await sbDelete('employees', id);
  db.employees = db.employees.filter(e => String(e.id) !== String(id));
  saveAll(); showToast('🗑️ 삭제됨'); renderRoster();
}

// ─ 3. 신청/승인 ────────────────────────────
function renderRequests(){
  const yr=currentYear;
  let list=db.requests.filter(r=>String(r.year)===String(yr) && canView(r) &&
    (isAdmin || (currentEmp && String(r.empId)===String(currentEmp.id))));
  if(reqFilter!=='all')list=list.filter(r=>r.status===reqFilter);
  if(reqTypeFilter!=='all')list=list.filter(r=>r.type===reqTypeFilter);
  list=list.slice().sort((a,b)=>b.id-a.id);
  const rows=list.map(r=>{
    const e=eid(r.empId);
    let tl='',det='';
    if(r.type==='leave'){tl=badge('연차','leave');det=`${fmt(r.startDate)}${r.endDate&&r.endDate!==r.startDate?' ~ '+fmt(r.endDate):''} / ${r.leaveType} (${r.hours}h)`;}
    else if(r.type==='ot'){tl=badge('특근','ot');det=`${fmt(r.date)} / ${r.otType} ${r.hours}h → 대휴 ${calcComp(r.hours,r.otType)}h`;}
    else if(r.type==='trip'){tl=badge('출장','trip');det=`${fmt(r.startDate)} ~ ${fmt(r.endDate)} / ${r.dest}`;}
    else if(r.type==='comp'){tl=badge('대체휴무','comp');det=`${fmt(r.startDate)} / ${r.hours}h`;}
    else if(r.type==='outside'){tl=badge('외근','trip');det=`${fmt(r.startDate)}${r.endDate&&r.endDate!==r.startDate?' ~ '+fmt(r.endDate):''}`;}
    else if(r.type==='education'){tl=badge('교육','ot');det=`${fmt(r.startDate)}${r.endDate&&r.endDate!==r.startDate?' ~ '+fmt(r.endDate):''} / ${r.reason||''}`;}
    const canA=isAdmin&&r.status==='pending';
    const canE=canEdit(r);
    return`<tr class="${r.status==='pending'?'row-pending':''}">
      <td><div class="name-cell">${av(r.empId)}<span>${e?e.name:'?'}</span></div></td>
      <td>${e?e.dept:''}</td><td>${tl}</td>
      <td style="max-width:200px;font-size:12px">${det}</td>
      <td style="font-size:12px;color:var(--text2);max-width:120px">${r.reason||''}</td>
      <td>${fmt(r.reqDate)}</td><td>${statusBadge(r.status)}</td>
      <td style="white-space:nowrap">
        ${canA?`<button class="btn btn-sm btn-ok" onclick="approveReq(${r.id})">승인</button> <button class="btn btn-sm btn-danger" onclick="rejectReq(${r.id})">반려</button>`:''}
        ${canE&&r.status!=='pending'&&isAdmin?`<button class="btn btn-sm" onclick="delReq(${r.id})">삭제</button>`:''}
        ${canE&&r.status==='pending'&&!isAdmin?`<button class="btn btn-sm btn-danger" onclick="delReq(${r.id})">취소</button>`:''}
        ${canE&&r.status==='pending'&&!isAdmin?`<button class="btn btn-sm" onclick="openEditReq(${r.id})">수정</button>`:''}
      </td>
    </tr>`;
  }).join('');
  setContent(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div class="req-filter">
        ${['all','pending','approved','rejected'].map(f=>`<button class="filter-btn ${reqFilter===f?'active':''}" onclick="setRF('${f}')">${{all:'전체',pending:'대기',approved:'승인',rejected:'반려'}[f]}</button>`).join('')}
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select onchange="setRTF(this.value)" style="padding:5px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text)">
          ${['all','leave','ot','comp','trip','outside','education'].map(t=>`<option value="${t}" ${reqTypeFilter===t?'selected':''}>${{all:'전체 유형',leave:'연차',ot:'특근',comp:'대체휴무',trip:'출장',outside:'외근',education:'교육'}[t]}</option>`).join('')}
        </select>
        <button class="btn btn-primary btn-sm" onclick="openAddRequest()">+ 신청하기</button>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>직원</th><th>부서</th><th>유형</th><th>내용</th><th>사유</th><th>신청일</th><th>상태</th><th>처리</th></tr></thead>
        <tbody>${rows||emptyRow(8)}</tbody>
      </table></div>
    </div>
  `);
}
function setRF(f){reqFilter=f;renderRequests();}
function setRTF(f){reqTypeFilter=f;renderRequests();}
async function approveReq(id){
  const r=db.requests.find(x=>String(x.id)===String(id));
  if(r){
    r.status='approved';
    await sbUpdate('requests', id, {status:'approved'});
    saveAll(); showToast('✅ 승인됨');
  }
  renderRequests();
}
async function rejectReq(id){
  const r=db.requests.find(x=>String(x.id)===String(id));
  if(r){
    r.status='rejected';
    await sbUpdate('requests', id, {status:'rejected'});
    saveAll(); showToast('❌ 반려됨');
  }
  renderRequests();
}
async function delReq(id,rerender){if(!confirm('삭제?'))return;await sbDelete('requests',id);db.requests=db.requests.filter(x=>String(x.id)!==String(id));saveAll();showToast('🗑️ 삭제됨');if(rerender==='ot')renderOT();else if(rerender==='trip')renderTrip();else if(rerender==='leave')renderLeave();else renderRequests();}

// ─ 4. 연차 ─────────────────────────────────
function renderLeave(){
  const yr=currentYear;

  // 3~5번: canView 적용 + 본인 내역 전체 표시
  const leaveRows=db.requests.filter(r=>r.type==='leave'&&String(r.year)===String(yr)&&canView(r)).slice().sort((a,b)=>b.id-a.id).map(r=>{
    const e=eid(r.empId);
    return`<tr class="${r.status==='pending'?'row-pending':r.status==='rejected'?'row-rejected':''}">
      <td><div class="name-cell">${av(r.empId)}<span>${e?e.name:'?'}</span></div></td>
      <td>${e?e.dept:''}</td><td>${r.leaveType}</td>
      <td>${fmt(r.startDate)}</td><td>${fmt(r.endDate||r.startDate)}</td>
      <td>${r.hours}h (${Math.round((+r.hours)/8*10)/10}일)</td>
      <td style="font-size:12px;color:var(--text2)">${r.reason}</td>
      <td>${statusBadge(r.status)}</td>
      <td style="white-space:nowrap">
        ${canEdit(r)?`<button class="btn btn-sm" onclick="openEditLeave(${r.id})">✏️ 수정</button>`:''}
        ${canEdit(r)&&(isAdmin||r.status==='pending')?`<button class="btn btn-sm btn-danger" style="margin-left:4px" onclick="delReq(${r.id},'leave')">삭제</button>`:''}
      </td>
    </tr>`;
  }).join('');

  // 6~11번: 개인별 현황 테이블 (법정연차 자동계산 + 사용률 3/1기준 + 관리자 경고)
  const alertThreshold = getLeaveAlertThreshold();
  const leaveEmps = isAdmin
    ? getSortedByPosition().filter(e=>!isHiddenFromPersonal(e))
    : getSortedByPosition().filter(e=>!isHiddenFromPersonal(e) && currentEmp && String(e.id)===String(currentEmp.id));
  const sumRows=leaveEmps.map(e=>{
    const a=getAlloc(e.id,yr);
    const legalDays = calcLegalLeave(e.joinDate); // 법정 연차
    const total=(+a.total||0)+(+a.carryover||0);
    const extinct=(+a.extinct||0);
    const used=getLeaveUsed(e.id,yr);
    const rem=total-extinct-used;
    const pct=getLeavePctInPeriod(e.id,yr); // 3/1 기준 사용률
    const remDays=Math.round(rem/8*10)/10;
    // 11번: 잔여 경고 (관리자에게만, 잔여% 기준)
    const remPct = total > 0 ? Math.round(rem/total*100) : 0;
    // 잔여율 기준 경고 (잔여가 많이 남아있으면 경고)
    const remAlert = isAdmin && (() => {
      const threshold = getLeaveAlertThreshold();
      if (threshold === null) return false;
      return remPct >= threshold;
    })();
    const NA=`<span style="font-size:12px;color:#bbb">임원</span>`;
    return`<tr ${e.isExternal?'style="background:#fafafa"':''}>
      <td><div class="name-cell">${av(e.id)}
        <span style="color:var(--accent);cursor:pointer;text-decoration:underline" onclick="${e.isExternal?'':isAdmin?`openLeaveAdmin(${e.id})`:`openAddLeave(${e.id})`}">${e.name}</span>
        ${e.isExternal?`<span class="badge" style="background:#f1f0ec;color:#888;border:1px solid #ddd;font-size:10px;margin-left:5px">⭐</span>`:''}
      </div></td>
      <td>${e.dept}</td>
      <td>${e.isExternal?NA:`${(+a.carryover||0)/8}일`}</td>
      <td>${e.isExternal?NA:`<span title="법정연차: ${legalDays}일">${(+a.total||0)/8}일 <span style="font-size:10px;color:var(--text3)">(법정${legalDays}일)</span></span>`}</td>
      <td>${e.isExternal?NA:`${total/8}일${extinct>0?` <span style="font-size:10px;color:var(--danger)">(-${extinct/8}소멸)</span>`:''}`}</td>
      <td>${e.isExternal?NA:badge(Math.round(used/8*10)/10+'일 ('+used+'h)','leave')}</td>
      <td>${e.isExternal?NA:`<span style="${remAlert?'color:var(--danger);font-weight:700':''}">${remDays}일${remAlert?' ⚠️':''}</span>`}</td>
      <td>${e.isExternal?NA:`<span style="${remAlert?'color:var(--danger);font-weight:700':''}">${pct}%${remAlert?' ⚠️':''}</span>
        <div class="prog-bar-wrap" style="width:60px"><div class="prog-bar" style="width:${pct}%;background:${remAlert?'var(--danger)':'var(--leave)'}"></div></div>`}</td>
    </tr>`;
  }).join('');

  // 5번: 연차 사용률 그래프 데이터
  const deptMap = {};
  getSortedByPosition().filter(e=>!isHiddenFromPersonal(e)).forEach(e=>{
    const a=getAlloc(e.id,yr);
    const total=(+a.total||0)+(+a.carryover||0)-(+a.extinct||0);
    const used=getLeaveUsed(e.id,yr);
    const pct=total>0?Math.round(used/total*100):0;
    if(!deptMap[e.dept]) deptMap[e.dept]={total:0,used:0,count:0};
    deptMap[e.dept].total+=total;
    deptMap[e.dept].used+=used;
    deptMap[e.dept].count++;
  });
  const deptBars=Object.entries(deptMap).map(([dept,d])=>{
    const p=d.total>0?Math.round(d.used/d.total*100):0;
    return`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="font-weight:500">${dept}</span>
        <span style="color:var(--text2)">${Math.round(d.used/8*10)/10}일 / ${Math.round(d.total/8*10)/10}일 (${p}%)</span>
      </div>
      <div style="background:var(--border);border-radius:4px;height:8px;overflow:hidden">
        <div style="width:${p}%;background:var(--leave);height:100%;border-radius:4px;transition:width .3s"></div>
      </div>
    </div>`;
  }).join('');

  setContent(`
    <div class="card" style="margin-bottom:10px">
      <div class="card-title">📊 부서별 연차 사용률 (${yr}년)</div>
      ${deptBars||'<div style="color:var(--text3);font-size:13px">데이터 없음</div>'}
    </div>
    ${isAdmin&&alertThreshold?`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--radius);padding:8px 14px;margin-bottom:12px;font-size:12px;color:var(--danger)">⚠️ 이번 달 기준: 잔여 연차 ${alertThreshold}% 이상인 직원이 빨간색으로 표시됩니다.</div>`:''}
    <div class="card">
      <div class="card-title">개인별 연차 현황 (${yr}년 · 사용률 기준: ${yr}/3/1 ~ ${yr+1}/2/28)</div>
      <div class="table-wrap"><table>
        <thead><tr><th>직원</th><th>부서</th><th>이월</th><th>부여</th><th>총계</th><th>사용</th><th>잔여</th><th>사용률</th></tr></thead>
        <tbody>${sumRows}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="card-title">연차 신청 내역 (${yr}년)
        <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
          ${adminSearchInput("leave-search","leave-table")}
          <button class="btn btn-primary btn-sm" onclick="openAddLeave()">+ 신청</button>
        </div>
      </div>
      <div class="table-wrap"><table id="leave-table">
        <thead><tr><th>직원</th><th>부서</th><th>구분</th><th>시작일</th><th>종료일</th><th>시간</th><th>사유</th><th>상태</th><th></th></tr></thead>
        <tbody>${leaveRows||emptyRow(9)}</tbody>
      </table></div>
    </div>
  `);
}

    </div>
    <div class="field" style="margin-bottom:12px">
      <label style="color:var(--danger)">이월된 연차 소멸 (일) <span style="font-size:11px;color:var(--text3)">※ 잔여연차에서 차감</span></label>
      <input id="la-extinct" type="number" value="${(+a.extinct||0)/8}" min="0" step="0.5"
        style="border-color:var(--danger)">
    </div>
    <div style="background:var(--bg);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--text2);margin-bottom:12px">
      소멸 후 잔여: <strong id="la-preview">계산 중...</strong>
      ${(+a.extinct||0)>0 ? `<div style="color:var(--danger);margin-top:4px">⚠️ 소멸 처리된 연차: <strong>${(+a.extinct||0)/8}일 (${+a.extinct||0}h)</strong></div>` : ''}
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveLeaveAdmin(${empId})">저장</button>
    </div>
    <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px">
      <button class="btn btn-primary btn-sm" onclick="closeModal();openAddLeave(${empId})">+ 연차 신청 (대리)</button>
    </div>
  `);
  // 소멸 후 잔여 실시간 계산
  const _laUsedH = getLeaveUsed(empId, yr);
  setTimeout(() => {
    const updatePreview = () => {
      const t = (parseFloat(document.getElementById('la-total')?.value)||0) * 8;
      const c = (parseFloat(document.getElementById('la-carry')?.value)||0) * 8;
      const x = (parseFloat(document.getElementById('la-extinct')?.value)||0) * 8;
      const remH = t + c - x - _laUsedH;
      const remD = Math.round(remH/8*10)/10;
      const pr = document.getElementById('la-preview');
      if (pr) pr.textContent = remD.toFixed(1) + '일 (' + Math.round(remH) + 'h)';
    };
    updatePreview();
    ['la-total','la-carry','la-extinct'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', updatePreview);
    });
  }, 150);
}

async function saveLeaveAdmin(empId) {
  const yr = currentYear;
  const total = (parseFloat(document.getElementById('la-total')?.value)||0) * 8;
  const carryover = (parseFloat(document.getElementById('la-carry')?.value)||0) * 8;
  const extinct = (parseFloat(document.getElementById('la-extinct')?.value)||0) * 8;
  const a = getAlloc(empId, yr);
  a.total = total; a.carryover = carryover; a.extinct = extinct;
  if (a.id) {
    await sbUpdate('leave_alloc', a.id, { total, carryover, extinct });
  } else {
    const saved = await sbInsert('leave_alloc', { emp_id: empId, year: yr, total, carryover, extinct });
    if (saved) a.id = saved.id;
  }
  saveAll(); showToast('✅ 연차 저장됨'); closeModal(); renderLeave();
}

function openAddOutside(empId) {

    </div>
    <div class="field" style="margin-bottom:16px"><label>사유 *</label><input id="out-reason" placeholder="외근 사유를 입력하세요"></div>
    <div class="modal-footer">

async function saveOutside(empId) {
  const s = getDateVal('out-start');
  const e2 = getDateVal('out-end') || s;
  const reason = document.getElementById('out-reason')?.value?.trim();
  if (!s) { showToast('시작일을 입력하세요'); return; }
  if (!reason) { showToast('사유를 입력하세요'); return; }
  const _r = {id:nextId++,type:'outside',empId,status:'pending',year:currentYear,startDate:s,endDate:e2,reason,reqDate:todayStr()};
  const _saved = await sbInsert('requests', {type:'outside',emp_id:empId,status:'pending',year:currentYear,start_date:s,end_date:e2,reason,req_date:todayStr()});
  if (_saved) {
    _r.id = _saved.id;
    db.requests.unshift(_r);
    saveAll(); showToast('✅ 외근 신청 완료'); await notifyAdmin(_r);
  } else { showToast('⚠️ 저장 실패'); }
  closeModal(); renderTrip();
}
